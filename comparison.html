<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>项目对比矩阵 - 神经免疫CAR-T情报工作台</title><style>
:root{--bg:#f6f7f5;--surface:#fff;--soft:#edf1ed;--border:#d8ddd7;--text:#18201a;--text2:#485149;--text3:#7a837c;--accent:#176049;--accent2:#0f766e;--accent-light:#e6f3ed;--amber:#936100;--amber-light:#fff5d6;--mono:"SF Mono","Fira Code",monospace;--sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font:14px/1.55 var(--sans)}a{color:inherit}nav{height:60px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);border-bottom:1px solid var(--border)}.nav-logo{font-weight:700;text-decoration:none}.nav-links{display:flex;gap:3px;list-style:none}.nav-links a{padding:7px 8px;border-radius:6px;color:var(--text2);font-size:12px;text-decoration:none}.nav-action{padding:6px 9px;border:1px solid var(--border);border-radius:6px;text-decoration:none;font-size:11px}.shell{max-width:1400px;margin:0 auto;padding:0 28px 48px}.hero{padding:30px 0 22px;border-bottom:1px solid var(--border)}.eyebrow{color:var(--accent2);font:10px var(--mono)}h1{margin-top:7px;font-size:32px}.hero p{max-width:850px;margin-top:8px;color:var(--text2)}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:18px 0}.stat,.toolbar,.matrix-wrap{border:1px solid var(--border);border-radius:8px;background:var(--surface)}.stat{padding:13px}.stat strong{display:block;color:var(--accent);font:700 21px var(--mono)}.stat span{color:var(--text3);font-size:10px}.toolbar{padding:11px;display:grid;grid-template-columns:minmax(220px,1fr) repeat(3,170px);gap:8px}.toolbar input,.toolbar select{height:38px;padding:0 10px;border:1px solid var(--border);border-radius:6px;background:white;color:var(--text)}.result-meta{padding:16px 0 9px;color:var(--text3);font-size:11px}.matrix-wrap{overflow:auto;max-height:calc(100vh - 270px)}table{width:100%;min-width:1250px;border-collapse:collapse}th{position:sticky;top:0;z-index:2;padding:10px;text-align:left;background:var(--soft);border-bottom:1px solid var(--border);color:var(--text3);font:10px var(--mono)}td{padding:11px 10px;border-bottom:1px solid var(--border);vertical-align:top;font-size:11px}tr:hover td{background:#fafcfb}.product{font-weight:700;font-size:12px}.sub{margin-top:3px;color:var(--text3);font-size:10px}.tag{display:inline-block;padding:3px 6px;border-radius:4px;background:var(--soft);margin:0 3px 3px 0;font-size:9px}.tag.active{background:#eaf7ef;color:#167044}.tag.warn{background:var(--amber-light);color:var(--amber)}.empty{padding:35px;text-align:center;color:var(--text3)}footer{max-width:1400px;margin:0 auto;padding:18px 28px 34px;color:var(--text3);font-size:11px}@media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr}.nav-links{display:none}}@media(max-width:560px){nav,.shell,footer{padding-left:15px;padding-right:15px}.stats{grid-template-columns:1fr}}
</style></head><body><nav><a class="nav-logo" href="index.html">神经免疫 CAR-T 情报工作台</a><ul class="nav-links"><li><a href="index.html">首页</a></li><li><a href="research.html">研究情报</a></li><li><a href="landscape.html">竞争格局</a></li><li><a href="safety.html">安全信号</a></li></ul><a class="nav-action" href="search.html">检索</a></nav><main class="shell"><section class="hero"><div class="eyebrow">PROGRAM COMPARISON</div><h1>项目对比矩阵</h1><p>横向比较正式核验项目的技术路线、靶点、阶段、病种、状态、规模和更新时间。矩阵用于研发与竞争判断，不替代原始试验方案。</p></section><section class="stats" id="stats"></section><section class="toolbar"><input id="query" type="search" placeholder="搜索产品、公司、NCT或适应症"><select id="route"><option value="all">全部技术路线</option></select><select id="status"><option value="all">全部状态</option></select><select id="region"><option value="all">全部地区</option></select></section><div class="result-meta" id="result-meta">正在读取正式项目数据...</div><section class="matrix-wrap"><table><thead><tr><th>项目 / 主体</th><th>技术路线</th><th>靶点</th><th>适应症</th><th>阶段</th><th>状态</th><th>规模</th><th>地区</th><th>最近更新</th><th>关键问题</th></tr></thead><tbody id="body"></tbody></table></section></main><footer>仅纳入正式数据集；候选池项目需完成核验后才会出现在矩阵中。</footer><script>
const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));let rows=[];const routeOf=t=>{const s=`${t.technology||""} ${t.product||""}`.toLowerCase();if(/car-nk/.test(s))return"CAR-NK";if(/in vivo/.test(s))return"体内CAR-T";if(/mrna/.test(s))return"mRNA CAR-T";if(/allogeneic|universal|off-the-shelf|ipsc|异体|通用/.test(s))return"异体/现货CAR-T";if(/autologous|自体|nex-t|rapid-manufacturing/.test(s))return"自体CAR-T";return"待分类"};const targetOf=t=>{const s=`${t.technology||""} ${t.product||""}`;const values=[];if(/CD19/i.test(s))values.push("CD19");if(/CD20/i.test(s))values.push("CD20");if(/CD70/i.test(s))values.push("CD70");if(/BCMA/i.test(s))values.push("BCMA");return values.join(" / ")||"未注明"};async function load(){const[trials,companies,relations]=await Promise.all([fetch("data/trials.json").then(r=>r.json()),fetch("data/landscape.json").then(r=>r.json()),fetch("data/relations.json").then(r=>r.json())]);rows=trials.filter(t=>t.record_kind==="registered_trial").map(trial=>{const rel=relations.find(r=>r.target_type==="trial"&&r.target_id===trial.id&&r.source_type==="company");const company=companies.find(c=>c.id===rel?.source_id)||{};return{...trial,company:company.company||trial.sponsor,technology:company.technology||trial.product,route:routeOf({...trial,...company}),target:targetOf({...trial,...company})}});initFilters();renderStats();apply()}function options(id,values){document.getElementById(id).insertAdjacentHTML("beforeend",values.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join(""))}function initFilters(){options("route",[...new Set(rows.map(r=>r.route))].sort());options("status",[...new Set(rows.map(r=>r.status))].sort());options("region",[...new Set(rows.map(r=>r.region))].sort())}function renderStats(){const routes=new Set(rows.map(r=>r.route));document.getElementById("stats").innerHTML=[[rows.length,"注册试验"],[rows.filter(r=>/Recruiting|Active/i.test(r.status)).length,"活跃项目"],[routes.size,"技术路线"],rows.reduce((n,r)=>n+(r.enrollment||0),0),"计划入组"].map((x,i)=>{const pair=Array.isArray(x)?x:[x,"计划入组"];return`<div class="stat"><strong>${pair[0]}</strong><span>${pair[1]}</span></div>`}).join("")}function apply(){const q=document.getElementById("query").value.toLowerCase();const route=document.getElementById("route").value,status=document.getElementById("status").value,region=document.getElementById("region").value;const list=rows.filter(r=>(route==="all"||r.route===route)&&(status==="all"||r.status===status)&&(region==="all"||r.region===region)&&(!q||JSON.stringify(r).toLowerCase().includes(q)));document.getElementById("result-meta").textContent=`显示 ${list.length} / ${rows.length} 个正式注册试验`;document.getElementById("body").innerHTML=list.length?list.map(r=>`<tr><td><div class="product"><a href="detail.html?type=trial&id=${encodeURIComponent(r.id)}">${esc(r.product)}</a></div><div class="sub">${esc(r.company)} · ${esc(r.registry_id)}</div></td><td><span class="tag">${esc(r.route)}</span></td><td>${esc(r.target)}</td><td>${esc(r.indication)}</td><td>${esc(r.phase)}</td><td><span class="tag ${/Recruiting|Active/i.test(r.status)?"active":"warn"}">${esc(r.status)}</span></td><td>${esc(r.enrollment)}</td><td>${esc(r.region)}</td><td>${esc(r.registry_last_update)}</td><td>${esc(r.key_question)}</td></tr>`).join(""):'<tr><td colspan="10" class="empty">当前筛选条件下没有项目。</td></tr>'}document.querySelectorAll("input,select").forEach(el=>el.addEventListener("input",apply));load();
</script><script>function renderStats(){const routes=new Set(rows.map(r=>r.route));const active=rows.filter(r=>!/^Not yet recruiting/i.test(r.status||"")&&/Recruiting|Active/i.test(r.status||"")).length;const stats=[[rows.length,"注册试验"],[active,"活跃项目"],[routes.size,"技术路线"],[rows.reduce((sum,row)=>sum+(row.enrollment||0),0),"计划入组"]];document.getElementById("stats").innerHTML=stats.map(([value,label])=>`<div class="stat"><strong>${value}</strong><span>${label}</span></div>`).join("")}</script><script src="assets/app-shell.js"></script></body></html>

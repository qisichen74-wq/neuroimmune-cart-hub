<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>全局检索 - 神经免疫CAR-T情报工作台</title>
<style>
  :root { --bg:#f6f7f6; --surface:#fff; --soft:#edf1ee; --border:#d7ddd9; --text:#17201b; --text2:#465049; --text3:#7b847e; --accent:#155f4a; --accent2:#0f766e; --accent-light:#e5f3ed; --red:#b42318; --red-light:#fff0ee; --amber:#936100; --amber-light:#fff5d6; --blue:#285e9b; --blue-light:#edf5ff; --mono:"SF Mono","Fira Code",monospace; --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  *{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font:14px/1.6 var(--sans)}a{color:inherit}
  nav{height:60px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;text-decoration:none;white-space:nowrap}.dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 0 4px rgba(15,118,110,.12)}.nav-links{display:flex;gap:3px;list-style:none}.nav-links a{display:block;padding:7px 9px;border-radius:6px;color:var(--text2);font-size:12px;text-decoration:none}.nav-links a:hover{background:var(--soft);color:var(--text)}.nav-action{padding:5px 9px;border:1px solid #b9d8cb;border-radius:999px;background:var(--accent-light);color:var(--accent);font:700 10px var(--mono);text-decoration:none;white-space:nowrap}
  .shell{max-width:1200px;margin:0 auto;padding:0 32px 48px}.search-hero{padding:34px 0 24px;border-bottom:1px solid var(--border)}.breadcrumb{margin-bottom:12px;color:var(--text3);font-size:12px}.breadcrumb a{color:var(--accent);text-decoration:none}.kicker{display:inline-flex;margin-bottom:13px;padding:5px 9px;border:1px solid #c6ded4;border-radius:999px;background:var(--accent-light);color:var(--accent2);font:11px var(--mono);text-transform:uppercase}.search-hero h1{font-size:32px;line-height:1.2}.search-hero p{max-width:760px;margin-top:8px;color:var(--text2);font-size:14px}.search-box{max-width:880px;margin-top:20px;display:grid;grid-template-columns:minmax(0,1fr) auto;border:1px solid #a9cbbd;border-radius:8px;background:var(--surface);box-shadow:0 10px 26px rgba(21,95,74,.08);overflow:hidden}.search-input{width:100%;height:52px;padding:0 16px;border:0;outline:0;background:transparent;color:var(--text);font:15px var(--sans)}.search-button{min-width:88px;border:0;background:var(--accent);color:#fff;font:700 13px var(--sans);cursor:pointer}.search-button:hover{background:#104f3d}.quick{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}.quick button{padding:5px 9px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--text2);font:11px var(--sans);cursor:pointer}.quick button:hover{border-color:#a9cbbd;color:var(--accent)}
  .stats{padding:18px 0;display:grid;grid-template-columns:repeat(6,1fr);gap:8px;border-bottom:1px solid var(--border)}.stat{padding:11px 13px;border:1px solid var(--border);border-radius:7px;background:var(--surface)}.stat strong{display:block;color:var(--accent);font:700 20px/1 var(--mono)}.stat span{display:block;margin-top:6px;color:var(--text3);font-size:10px}
  .workspace{padding-top:24px;display:grid;grid-template-columns:280px minmax(0,1fr);gap:18px}.panel,.result-card{border:1px solid var(--border);border-radius:8px;background:var(--surface)}.panel{padding:15px;margin-bottom:12px}.panel-title{margin-bottom:10px;color:var(--text3);font:700 11px var(--mono);text-transform:uppercase}.filter-list{display:flex;flex-direction:column;gap:5px}.filter{width:100%;padding:8px 9px;display:flex;justify-content:space-between;gap:8px;border:0;border-radius:6px;background:transparent;color:var(--text2);font:12px var(--sans);text-align:left;cursor:pointer}.filter:hover{background:var(--soft)}.filter.active{background:var(--accent-light);color:var(--accent);font-weight:700}.count{padding:2px 6px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--text3);font:10px var(--mono)}.monitor-row{padding:9px 0;display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--border);font-size:11px}.monitor-row:last-child{border-bottom:0}.monitor-row span{color:var(--text3)}
  .results-head{margin-bottom:12px;display:flex;justify-content:space-between;align-items:end;gap:12px}.results-head h2{font-size:21px}.result-info{color:var(--text3);font:11px var(--mono)}.results{display:flex;flex-direction:column;gap:9px}.result-card{padding:16px 18px;display:block;text-decoration:none;transition:.14s ease}.result-card:hover{border-color:#9fc7b6;box-shadow:0 8px 20px rgba(23,32,27,.05);transform:translateY(-1px)}.result-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.result-type{color:var(--accent2);font:10px var(--mono);text-transform:uppercase}.result-title{margin-top:4px;font-size:16px;line-height:1.42}.priority{flex:0 0 auto;padding:4px 8px;border-radius:999px;font-size:10px;font-weight:700}.priority-高{color:var(--red);background:var(--red-light)}.priority-中{color:var(--amber);background:var(--amber-light)}.priority-低{color:var(--blue);background:var(--blue-light)}.result-copy{margin-top:8px;color:var(--text2);font-size:12px}.result-footer{margin-top:11px;display:flex;justify-content:space-between;gap:10px;align-items:center}.tags{display:flex;flex-wrap:wrap;gap:5px}.tag{padding:3px 7px;border:1px solid var(--border);border-radius:999px;background:var(--soft);color:var(--text3);font:10px var(--mono)}.go{color:var(--accent);font-size:11px;font-weight:700;white-space:nowrap}.highlight{padding:0 2px;background:#ffefa8;color:inherit}.empty{padding:52px 20px;border:1px dashed var(--border);border-radius:8px;color:var(--text3);text-align:center}body>footer{max-width:1200px;margin:0 auto;padding:20px 32px 36px;border-top:1px solid var(--border);color:var(--text3);font-size:11px}
  @media(max-width:980px){.workspace{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}}@media(max-width:760px){nav{padding:0 16px}.nav-links{display:none}.shell{padding:0 16px 32px}.search-hero{padding-top:24px}.search-hero h1{font-size:27px}.stats{grid-template-columns:repeat(2,1fr)}.result-footer{align-items:flex-start;flex-direction:column}.search-button{min-width:72px}body>footer{padding:18px 16px 28px}}
</style>
</head>
<body>
<nav><a class="nav-logo" href="index.html"><span class="dot"></span>神经免疫 CAR-T 情报工作台</a><ul class="nav-links"><li><a href="index.html">首页</a></li><li><a href="topics.html">专题档案</a></li><li><a href="research.html">研究情报</a></li><li><a href="landscape.html">竞争格局</a></li></ul><a class="nav-action" href="search.html">全局检索</a></nav>
<main class="shell">
  <section class="search-hero"><div class="breadcrumb"><a href="index.html">首页</a> / 全局检索</div><span class="kicker">Global Intelligence Search</span><h1>跨研究、项目、试验与动态统一检索</h1><p>搜索疾病、产品、机构、机制或结论。结果直接来自当前结构化数据，不需要逐页查找。</p><form class="search-box" id="search-form"><input class="search-input" id="search-input" type="search" placeholder="例如：MS、KYV-101、Phase 2、B细胞重建" autocomplete="off" aria-label="全局检索关键词"><button class="search-button" type="submit">检索</button></form><div class="quick"><button data-query="MS">MS</button><button data-query="MG">MG</button><button data-query="CD19 CAR-T">CD19 CAR-T</button><button data-query="B细胞重建">B细胞重建</button><button data-query="长期随访">长期随访</button></div></section>
  <section class="stats" id="stats"></section>
  <div class="workspace"><aside><div class="panel"><div class="panel-title">对象类型</div><div class="filter-list" id="type-filters"></div></div><div class="panel"><div class="panel-title">优先级</div><div class="filter-list" id="priority-filters"></div></div><div class="panel"><div class="panel-title">数据覆盖</div><div id="coverage"></div></div></aside><section><div class="results-head"><div><div class="panel-title">Search Results</div><h2 id="results-title">全部情报对象</h2></div><span class="result-info" id="result-info">正在建立索引...</span></div><div class="results" id="results"><div class="empty">正在加载全局数据...</div></div></section></div>
</main>
<footer>检索结果来自工作台当前结构化数据。正式判断仍应回到原始来源、试验披露和监管信息。</footer>
<script>
const CONFIG={
  topic:{label:"专题档案",file:"data/topics.json",title:"name",copy:"summary",priority:"priority",tags:["kind","maturity","short_name","keywords"],fields:["name","short_name","kind","maturity","summary","thesis","unmet_need","next_catalyst","keywords","key_questions","evidence_gaps"],url:item=>`topic.html?id=${encodeURIComponent(item.id)}`},
  research:{label:"研究证据",file:"data/feed.json",title:"title_cn",copy:"one_liner",priority:"priority",tags:["disease","evidence_level","entity","region"],fields:["title_cn","one_liner","takeaway","priority_reason","disease","evidence_level","entity","region","tags","pmid"],url:item=>`detail.html?type=research&id=${encodeURIComponent(item.id)}`},
  company:{label:"竞争对象",file:"data/landscape.json",title:"company",copy:"recent_update",priority:"priority",tags:["product","technology","stage","region","focus"],fields:["company","product","technology","focus","stage","region","status","evidence_anchor","recent_update","watch_points"],url:item=>`detail.html?type=company&id=${encodeURIComponent(item.id)}`},
  trial:{label:"临床试验",file:"data/trials.json",title:"trial_name",copy:"evidence_goal",priority:"priority",tags:["product","indication","phase","region"],fields:["trial_name","sponsor","product","indication","phase","design","region","status","evidence_goal","key_question","watch_points"],url:item=>`detail.html?type=trial&id=${encodeURIComponent(item.id)}`},
  event:{label:"动态事件",file:"data/events.json",title:"title",copy:"summary",priority:"priority",tags:["event_type","topic","status","date"],fields:["title","summary","impact","event_type","topic","status","source_label","date"],url:()=>"search.html"}
};
let index=[];let results=[];let query="";const active={type:"全部",priority:"全部"};const rank={高:0,中:1,低:2};
function flat(value){return Array.isArray(value)?value.map(flat).join(" "):String(value??"")}
function normalize(value){return flat(value).toLocaleLowerCase("zh-CN").replace(/\s+/g," ").trim()}
function esc(value){return String(value??"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]))}
async function loadIndex(){try{const groups=await Promise.all(Object.entries(CONFIG).map(async([type,config])=>[type,await fetch(config.file).then(response=>{if(!response.ok)throw new Error(config.file);return response.json()})]));index=groups.flatMap(([type,items])=>items.map(item=>{const config=CONFIG[type];const searchable=config.fields.map(field=>flat(item[field])).join(" ");return{type,item,title:item[config.title]||"未命名对象",copy:item[config.copy]||"",priority:item[config.priority]||"中",tags:config.tags.flatMap(field=>Array.isArray(item[field])?item[field]:[item[field]]).filter(Boolean),search:normalize(searchable),url:config.url(item)}}))}catch(error){index=[]}const initial=new URLSearchParams(location.search).get("q")||"";document.getElementById("search-input").value=initial;query=normalize(initial);renderStats();renderFilters();renderCoverage();bindEvents();applySearch()}
function renderStats(){document.getElementById("stats").innerHTML=Object.entries(CONFIG).map(([type,config])=>{const count=index.filter(x=>x.type===type).length;return`<div class="stat"><strong>${count}</strong><span>${config.label}</span></div>`}).join("")}
function buttons(group,values){return["全部",...values].map(value=>{const count=value==="全部"?index.length:index.filter(x=>group==="type"?x.type===value:x.priority===value).length;const label=group==="type"&&value!=="全部"?CONFIG[value].label:value;return`<button class="filter${value==="全部"?" active":""}" data-group="${group}" data-value="${value}"><span>${label}</span><span class="count">${count}</span></button>`}).join("")}
function renderFilters(){document.getElementById("type-filters").innerHTML=buttons("type",Object.keys(CONFIG));document.getElementById("priority-filters").innerHTML=buttons("priority",["高","中","低"])}
function renderCoverage(){const rows=[["总对象",index.length],["高优先级",index.filter(x=>x.priority==="高").length],["可进入详情",index.filter(x=>x.type!=="event").length],["动态事件",index.filter(x=>x.type==="event").length]];document.getElementById("coverage").innerHTML=rows.map(([label,value])=>`<div class="monitor-row"><span>${label}</span><strong>${value}</strong></div>`).join("")+`<a href="quality.html" style="display:block;margin-top:10px;color:var(--accent);font-size:11px;font-weight:700;text-decoration:none">查看数据质量报告</a>`}
function bindEvents(){document.getElementById("search-form").addEventListener("submit",event=>{event.preventDefault();setQuery(document.getElementById("search-input").value)});document.getElementById("search-input").addEventListener("input",event=>{query=normalize(event.target.value);updateUrl();applySearch()});document.querySelectorAll(".quick button").forEach(button=>button.addEventListener("click",()=>setQuery(button.dataset.query)));document.querySelectorAll(".filter").forEach(button=>button.addEventListener("click",()=>{const group=button.dataset.group;active[group]=button.dataset.value;document.querySelectorAll(`.filter[data-group="${group}"]`).forEach(x=>x.classList.toggle("active",x===button));applySearch()}))}
function setQuery(value){document.getElementById("search-input").value=value;query=normalize(value);updateUrl();applySearch()}
function updateUrl(){const url=new URL(location.href);query?url.searchParams.set("q",document.getElementById("search-input").value.trim()):url.searchParams.delete("q");history.replaceState({},"",url)}
function score(entry){if(!query)return 0;const tokens=query.split(" ").filter(Boolean);let score=0;for(const token of tokens){if(normalize(entry.title).includes(token))score+=8;if(normalize(entry.tags).includes(token))score+=4;if(entry.search.includes(token))score+=2;else return-1}return score}
function applySearch(){results=index.map(entry=>({...entry,score:score(entry)})).filter(entry=>entry.score>=0&&(active.type==="全部"||entry.type===active.type)&&(active.priority==="全部"||entry.priority===active.priority)).sort((a,b)=>b.score-a.score||(rank[a.priority]??9)-(rank[b.priority]??9)||a.title.localeCompare(b.title,"zh-CN"));renderResults()}
function highlight(value){const text=esc(value);if(!query)return text;const tokens=[...new Set(query.split(" ").filter(Boolean))].sort((a,b)=>b.length-a.length);return tokens.reduce((html,token)=>html.replace(new RegExp(`(${token.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi"),'<mark class="highlight">$1</mark>'),text)}
function renderResults(){document.getElementById("results-title").textContent=query?`“${document.getElementById("search-input").value.trim()}” 的检索结果`:"全部情报对象";document.getElementById("result-info").textContent=`显示 ${results.length} / ${index.length} 项`;document.getElementById("results").innerHTML=results.length?results.map(entry=>`<a class="result-card" href="${entry.url}"><div class="result-top"><div><div class="result-type">${CONFIG[entry.type].label}</div><h3 class="result-title">${highlight(entry.title)}</h3></div><span class="priority priority-${entry.priority}">${entry.priority}${entry.type==="safety"?"严重度":"优先级"}</span></div><p class="result-copy">${highlight(entry.copy||"暂无摘要")}</p><div class="result-footer"><div class="tags">${entry.tags.slice(0,4).map(tag=>`<span class="tag">${highlight(flat(tag))}</span>`).join("")}</div><span class="go">${entry.type==="event"?"进入时间线":"查看详情"}</span></div></a>`).join(""):'<div class="empty">没有找到匹配内容。可以缩短关键词，或切换对象类型和优先级。</div>'}
loadIndex();
</script>
<script src="assets/app-shell.js"></script>
</body>
</html>

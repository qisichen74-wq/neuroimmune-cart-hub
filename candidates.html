<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>候选情报池 - 神经免疫CAR-T情报工作台</title>
<style>
:root{--bg:#f6f7f5;--surface:#fff;--soft:#edf1ed;--border:#d8ddd7;--text:#18201a;--text2:#485149;--text3:#7a837c;--accent:#176049;--accent2:#0f766e;--accent-light:#e6f3ed;--amber:#936100;--amber-light:#fff5d6;--mono:"SF Mono","Fira Code",monospace;--sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font:14px/1.6 var(--sans)}a{color:inherit}nav{height:60px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10;background:rgba(255,255,255,.95);border-bottom:1px solid var(--border)}.nav-logo{font-weight:700;text-decoration:none}.nav-links{display:flex;gap:3px;list-style:none}.nav-links a{padding:7px 8px;border-radius:6px;color:var(--text2);font-size:12px;text-decoration:none}.nav-action{padding:6px 9px;border:1px solid var(--border);border-radius:6px;text-decoration:none;font-size:11px}.shell{max-width:1180px;margin:0 auto;padding:0 32px 48px}.hero{padding:32px 0 24px;border-bottom:1px solid var(--border)}.kicker{color:var(--accent2);font:11px var(--mono)}h1{margin-top:8px;font-size:32px;line-height:1.2}.hero p{max-width:780px;margin-top:9px;color:var(--text2)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:18px 0}.stat,.toolbar,.candidate{border:1px solid var(--border);border-radius:8px;background:var(--surface)}.stat{padding:14px}.stat strong{display:block;color:var(--accent);font:700 22px var(--mono)}.stat span{color:var(--text3);font-size:11px}.toolbar{padding:12px;display:grid;grid-template-columns:minmax(220px,1fr) 150px 150px;gap:8px}.toolbar input,.toolbar select{width:100%;height:38px;padding:0 10px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font:12px var(--sans)}.result-head{display:flex;justify-content:space-between;gap:12px;padding:18px 0 10px;color:var(--text3);font-size:11px}.list{display:grid;gap:8px}.candidate{padding:15px;display:grid;grid-template-columns:70px minmax(0,1fr) 180px;gap:14px}.score{color:var(--accent);font:700 22px var(--mono)}.score small{display:block;color:var(--text3);font:9px var(--sans)}.candidate h2{font-size:15px;line-height:1.4}.candidate h2 a{text-decoration:none}.candidate h2 a:hover{color:var(--accent)}.meta{margin-top:7px;display:flex;flex-wrap:wrap;gap:5px}.tag{padding:3px 6px;border-radius:4px;background:var(--soft);color:var(--text2);font-size:10px}.tag.pending{background:var(--amber-light);color:var(--amber)}.side{color:var(--text3);font:10px var(--mono)}.side strong{display:block;margin-bottom:5px;color:var(--text2);font:11px var(--sans)}.empty{padding:36px;text-align:center;color:var(--text3)}footer{max-width:1180px;margin:0 auto;padding:20px 32px 36px;color:var(--text3);font-size:11px}@media(max-width:850px){.stats{grid-template-columns:repeat(2,1fr)}.candidate{grid-template-columns:52px minmax(0,1fr)}.side{grid-column:2}.toolbar{grid-template-columns:1fr}.nav-links{display:none}}@media(max-width:560px){nav,.shell,footer{padding-left:16px;padding-right:16px}.stats{grid-template-columns:1fr}.candidate{grid-template-columns:1fr}.side{grid-column:1}.score small{display:inline;margin-left:5px}}
</style><style>.toolbar{grid-template-columns:minmax(220px,1fr) 150px 150px 150px}</style></head><body>
<nav><a class="nav-logo" href="index.html">神经免疫 CAR-T 情报工作台</a><ul class="nav-links"><li><a href="index.html">首页</a></li><li><a href="timeline.html">动态时间线</a></li><li><a href="research.html">研究情报</a></li><li><a href="landscape.html">竞争格局</a></li><li><a href="trials.html">里程碑试验</a></li><li><a href="safety.html">安全信号</a></li></ul><a class="nav-action" href="search.html">检索</a></nav>
<main class="shell"><section class="hero"><span class="kicker">DISCOVERY QUEUE</span><h1>候选情报池</h1><p>来自PubMed和ClinicalTrials.gov的自动发现结果。这里的记录仅用于编辑筛选，完成一手来源逐字段核验后才能进入正式情报库。</p></section><section class="stats" id="stats"></section><section class="toolbar"><input id="query" type="search" placeholder="搜索标题、PMID、NCT、申办方或病种"><select id="type"><option value="all">全部类型</option><option value="trial">临床试验</option><option value="research">研究文献</option></select><select id="score"><option value="0">全部相关度</option><option value="8">高相关度（8+）</option><option value="10">核心候选（10+）</option></select></section><div class="result-head"><span id="result-count">正在读取候选报告...</span><span id="generated"></span></div><section class="list" id="list"></section></main>
<footer>候选记录不代表疗效、安全性、注册状态或监管结论已经获得本网站确认。</footer>
<script>
const esc=value=>String(value??"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]));let report={candidates:[],summary:{}};async function load(){try{report=await fetch("data/candidate-report.json").then(response=>response.json());renderStats();apply();document.getElementById("generated").textContent="发现于 "+new Date(report.generated_at).toLocaleString("zh-CN")}catch{document.getElementById("list").innerHTML='<div class="empty">候选报告尚未生成。</div>'}}function renderStats(){const s=report.summary;document.getElementById("stats").innerHTML=[[s.candidates,"候选总数"],[s.trials,"临床试验"],[s.research,"研究文献"],[report.candidates.filter(item=>item.relevance_score>=10).length,"核心候选"]].map(([value,label])=>`<div class="stat"><strong>${value}</strong><span>${label}</span></div>`).join("")}function apply(){const query=document.getElementById("query").value.trim().toLowerCase();const type=document.getElementById("type").value;const min=Number(document.getElementById("score").value);const rows=report.candidates.filter(item=>(type==="all"||item.candidate_type===type)&&item.relevance_score>=min&&(!query||JSON.stringify(item).toLowerCase().includes(query)));document.getElementById("result-count").textContent=`显示 ${rows.length} / ${report.candidates.length} 条候选`;document.getElementById("list").innerHTML=rows.length?rows.map(item=>`<article class="candidate"><div class="score">${item.relevance_score}<small>相关度</small></div><div><h2><a href="${esc(item.source_url)}" target="_blank" rel="noopener">${esc(item.title)}</a></h2><div class="meta"><span class="tag pending">待人工核验</span><span class="tag">${item.candidate_type==="trial"?"临床试验":"研究文献"}</span>${(item.matched_diseases||[]).map(value=>`<span class="tag">${esc(value)}</span>`).join("")}</div></div><div class="side"><strong>${esc(item.external_id)}</strong>${esc(item.sponsor||item.journal||item.source)}<br>${esc(item.last_update_posted||item.publication_date||"")}</div></article>`).join(""):'<div class="empty">当前筛选条件下没有候选记录。</div>'}document.querySelectorAll("input,select").forEach(element=>element.addEventListener("input",apply));load();
</script><script>
const tierSelect=document.createElement("select");tierSelect.id="tier";tierSelect.innerHTML='<option value="all">全部分级</option><option value="立即核验">立即核验</option><option value="持续观察">持续观察</option><option value="背景材料">背景材料</option><option value="低相关">低相关</option>';document.querySelector(".toolbar").insertBefore(tierSelect,document.getElementById("score"));tierSelect.addEventListener("input",apply);
function renderStats(){const s=report.summary;document.getElementById("stats").innerHTML=[[s.candidates,"候选总数"],[s.immediate_review||0,"立即核验"],[s.watchlist||0,"持续观察"],[s.background||0,"背景材料"]].map(([value,label])=>`<div class="stat"><strong>${value}</strong><span>${label}</span></div>`).join("")}
function apply(){const query=document.getElementById("query").value.trim().toLowerCase();const type=document.getElementById("type").value;const tier=document.getElementById("tier").value;const min=Number(document.getElementById("score").value);const rows=report.candidates.filter(item=>(type==="all"||item.candidate_type===type)&&(tier==="all"||item.triage_tier===tier)&&item.relevance_score>=min&&(!query||JSON.stringify(item).toLowerCase().includes(query)));document.getElementById("result-count").textContent=`显示 ${rows.length} / ${report.candidates.length} 条候选`;document.getElementById("list").innerHTML=rows.length?rows.map(item=>`<article class="candidate"><div class="score">${item.relevance_score}<small>相关度</small></div><div><h2><a href="${esc(item.source_url)}" target="_blank" rel="noopener">${esc(item.title)}</a></h2><div class="meta"><span class="tag pending">${esc(item.triage_tier||"待分级")}</span><span class="tag">${item.candidate_type==="trial"?"临床试验":"研究文献"}</span>${(item.matched_diseases||[]).map(value=>`<span class="tag">${esc(value)}</span>`).join("")}</div><p style="margin-top:7px;color:var(--text2);font-size:10px">${esc((item.triage_reasons||[]).join(" · "))}</p></div><div class="side"><strong>${esc(item.external_id)}</strong>${esc(item.sponsor||item.journal||item.source)}<br>${esc(item.last_update_posted||item.publication_date||"")}</div></article>`).join(""):'<div class="empty">当前筛选条件下没有候选记录。</div>'}
</script><script src="assets/app-shell.js"></script></body></html>

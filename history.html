<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>变化历史 - 神经免疫CAR-T情报工作台</title><style>:root{--bg:#f4f6f4;--surface:#fff;--soft:#eef2ef;--border:#d6ddd8;--text:#172019;--text2:#465149;--text3:#707b73;--accent:#176049;--accent-light:#e7f3ed;--mono:"SF Mono",monospace;--sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font:14px/1.6 var(--sans)}nav{height:60px;padding:0 30px;display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:1px solid var(--border)}nav a{text-decoration:none}.nav-logo{font-weight:700}.nav-links{display:flex;gap:15px}.shell{max-width:1180px;margin:auto;padding:30px}.hero{padding-bottom:24px;border-bottom:1px solid var(--border)}.eyebrow{color:var(--accent);font:10px var(--mono)}h1{margin-top:7px;font-size:32px}.hero p{max-width:760px;margin-top:8px;color:var(--text2)}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:18px 0}.card,.change{background:#fff;border:1px solid var(--border);border-radius:8px}.card{padding:15px}.card strong{display:block;color:var(--accent);font:700 23px var(--mono)}.card span{font-size:10px;color:var(--text3)}.section-head{display:flex;justify-content:space-between;align-items:end;margin:12px 0}.section-head h2{font-size:21px}.section-head span{color:var(--text3);font-size:10px}.list{display:grid;gap:8px}.change{padding:14px;display:grid;grid-template-columns:120px 1fr 1fr;gap:12px}.change code{font:10px var(--mono);color:var(--text3)}.change strong{font-size:12px}.value{padding:8px;background:var(--soft);border-radius:5px;font-size:11px;overflow-wrap:anywhere}.empty{padding:44px;background:#fff;border:1px solid var(--border);border-radius:8px;text-align:center;color:var(--text3)}footer{max-width:1180px;margin:auto;padding:0 30px 35px;color:var(--text3);font-size:10px}@media(max-width:700px){.nav-links{display:none}.shell{padding:22px 15px}.summary{grid-template-columns:1fr}.change{grid-template-columns:1fr}}</style></head><body><nav><a class="nav-logo" href="index.html">神经免疫 CAR-T 情报工作台</a><div class="nav-links"><a href="comparison.html">项目对比</a><a href="candidates.html">候选池</a><a href="quality.html">数据质量</a></div></nav><main class="shell"><section class="hero"><div class="eyebrow">CHANGE INTELLIGENCE</div><h1>官方字段变化历史</h1><p>记录ClinicalTrials.gov和NCBI官方字段的真实变化，包括状态、入组数、关键日期、标题和DOI。首次运行仅建立基线，不制造虚假变化事件。</p></section><section class="summary" id="summary"></section><div class="section-head"><h2>变化记录</h2><span id="generated"></span></div><section class="list" id="list"><div class="empty">正在读取变化历史...</div></section></main><footer>变化日志最多保留最近1000项；每条变化仍需结合原始记录解释。</footer><script>const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));Promise.all([fetch("data/change-history.json").then(r=>r.json()),fetch("data/source-snapshots.json").then(r=>r.json())]).then(([history,snapshots])=>{const changes=[...history.changes].reverse();const trials=Object.keys(snapshots.records).filter(k=>k.startsWith("trial:")).length;const research=Object.keys(snapshots.records).filter(k=>k.startsWith("research:")).length;document.getElementById("summary").innerHTML=[[trials,"试验快照"],[research,"文献快照"],[changes.length,"累计字段变化"]].map(([v,l])=>`<article class="card"><strong>${v}</strong><span>${l}</span></article>`).join("");document.getElementById("generated").textContent="最近核查 "+new Date(history.generated_at).toLocaleString("zh-CN");document.getElementById("list").innerHTML=changes.length?changes.map(x=>`<article class="change"><div><strong>${esc(x.record_id)}</strong><br><code>${esc(x.detected_at)}</code></div><div><code>${esc(x.field)} · 变更前</code><div class="value">${esc(x.previous_value)}</div></div><div><code>${esc(x.field)} · 变更后</code><div class="value">${esc(x.current_value)}</div></div></article>`).join(""):'<div class="empty">当前没有检测到官方字段变化。基线快照已经建立，后续每日核查会自动记录变化。</div>'}).catch(()=>document.getElementById("list").innerHTML='<div class="empty">变化历史尚未生成。</div>');</script><script src="assets/app-shell.js"></script></body></html>

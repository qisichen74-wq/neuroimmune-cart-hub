name: Refresh public intelligence data

on:
  schedule:
    - cron: "30 22 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the production branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Refresh and verify public data
        run: npm run update:daily

      - name: Verify the production build
        run: npm run build:site

      - name: Persist verified data
        run: |
          if test -z "$(git status --porcelain -- data)"; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: refresh public intelligence"
          git push origin HEAD:main

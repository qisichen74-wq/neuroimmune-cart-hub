<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>专题详情 - 神经免疫CAR-T情报工作台</title>
<style>
:root{--bg:#f6f7f5;--surface:#fff;--soft:#edf1ed;--border:#d8ddd7;--text:#18201a;--text2:#475149;--text3:#7b847d;--accent:#176049;--accent2:#0f766e;--accent-light:#e6f3ed;--mono:"SF Mono","Fira Code",monospace;--sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font:14px/1.65 var(--sans)}a{color:inherit}nav{height:60px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;text-decoration:none}.dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 0 4px rgba(15,118,110,.12)}.nav-links{display:flex;gap:3px;list-style:none}.nav-links a{padding:7px 8px;border-radius:6px;color:var(--text2);font-size:12px;text-decoration:none}.nav-links a:hover{background:var(--soft)}.nav-links a.active{background:var(--accent-light);color:var(--accent);font-weight:700}.nav-action{padding:5px 9px;border:1px solid var(--border);border-radius:999px;background:var(--soft);color:var(--text3);font:10px var(--mono);text-decoration:none}.shell{max-width:1120px;margin:0 auto;padding:0 32px 48px}.hero{padding:34px 0 26px;border-bottom:1px solid var(--border)}.breadcrumb{margin-bottom:13px;color:var(--text3);font-size:12px}.breadcrumb a{color:var(--accent);text-decoration:none}.kicker{display:inline-flex;margin-bottom:13px;padding:5px 9px;border:1px solid #c6ded3;border-radius:999px;background:var(--accent-light);color:var(--accent2);font:11px var(--mono);text-transform:uppercase}.hero h1{font-size:34px;line-height:1.18}.hero-sub{max-width:820px;margin-top:10px;color:var(--text2);font-size:15px}.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}.tag{padding:4px 8px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--text3);font:10px var(--mono)}.layout{padding-top:24px;display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:18px}.stack{display:flex;flex-direction:column;gap:13px}.panel,.object{border:1px solid var(--border);border-radius:8px;background:var(--surface)}.panel{padding:19px}.eyebrow{margin-bottom:6px;color:var(--text3);font:11px var(--mono);text-transform:uppercase}.panel h2{margin-bottom:10px;font-size:19px}.thesis{padding:14px;border-left:3px solid var(--accent2);background:var(--accent-light);color:#2f5445}.copy{color:var(--text2);font-size:12px}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}.list{display:flex;flex-direction:column;gap:7px}.list-item{padding:10px 12px;display:flex;gap:8px;border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:12px}.list-item b{color:var(--accent)}.section-head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:10px}.section-head span{color:var(--text3);font:10px var(--mono)}.objects{display:flex;flex-direction:column;gap:7px}.object{padding:12px;display:block;text-decoration:none}.object:hover{border-color:#a0c6b5;background:var(--accent-light)}.object-type{color:var(--accent2);font:10px var(--mono);text-transform:uppercase}.object strong{display:block;margin-top:3px;font-size:13px;line-height:1.4}.object p{margin-top:4px;color:var(--text3);font-size:11px}.antibody-groups{display:flex;flex-direction:column;gap:12px}.antibody-group{padding-top:12px;border-top:1px solid var(--border)}.antibody-group:first-child{padding-top:0;border-top:0}.antibody-group h3{font-size:14px}.antibody-logic{margin:4px 0 9px;color:var(--text3);font-size:11px}.antibody-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}.antibody-item{padding:11px;border:1px solid var(--border);border-radius:7px;background:var(--soft)}.antibody-item strong{display:block;color:var(--accent);font-size:12px}.antibody-item p{margin-top:4px;color:var(--text2);font-size:10px}.antibody-item span{display:block;margin-top:7px;color:var(--text3);font-size:10px}.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.metric{padding:13px;border:1px solid var(--border);border-radius:7px;background:var(--soft)}.metric strong{display:block;color:var(--accent);font:700 21px/1 var(--mono)}.metric span{display:block;margin-top:7px;color:var(--text3);font-size:10px}.empty{padding:28px;color:var(--text3);text-align:center}.error{max-width:700px;margin:70px auto;padding:28px;border:1px solid var(--border);border-radius:8px;background:var(--surface);text-align:center}.error p{margin:9px 0;color:var(--text2)}body>footer{max-width:1120px;margin:0 auto;padding:20px 32px 36px;border-top:1px solid var(--border);color:var(--text3);font-size:11px}@media(max-width:900px){.layout{grid-template-columns:1fr}}@media(max-width:700px){nav{padding:0 16px}.nav-links{display:none}.shell{padding:0 16px 32px}.hero{padding-top:24px}.hero h1{font-size:28px}.split,.antibody-grid{grid-template-columns:1fr}body>footer{padding:18px 16px 28px}}
</style></head><body><nav><a class="nav-logo" href="index.html"><span class="dot"></span>神经免疫 CAR-T 情报工作台</a><ul class="nav-links"><li><a href="topics.html" class="active">专题档案</a></li><li><a href="research.html">研究情报</a></li><li><a href="landscape.html">竞争格局</a></li></ul><a class="nav-action" href="search.html">全局检索</a></nav><main class="shell" id="app"><div class="empty">正在聚合专题数据...</div></main><footer>专题内容由结构化数据聚合生成，关联关系代表情报上下文，不自动等同于临床因果。</footer>
<script>
const CONFIG={research:{label:"研究证据",file:"data/feed.json",title:"title_cn",copy:"one_liner",url:id=>`detail.html?type=research&id=${encodeURIComponent(id)}`},company:{label:"竞争对象",file:"data/landscape.json",title:"company",copy:"recent_update",url:id=>`detail.html?type=company&id=${encodeURIComponent(id)}`},trial:{label:"临床试验",file:"data/trials.json",title:"trial_name",copy:"evidence_goal",url:id=>`detail.html?type=trial&id=${encodeURIComponent(id)}`}};
let topics=[];let datasets={};let relations=[];const topicId=new URLSearchParams(location.search).get("id");const LANGUAGE=localStorage.getItem("intel-language")==="en"?"en":"zh";
function localizeTopic(topic){return LANGUAGE==="en"&&topic.i18n?.en?{...topic,...topic.i18n.en,related:topic.related}:topic}
function esc(value){return String(value??"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]))}
async function load(){try{topics=(await fetch("data/topics.json").then(r=>{if(!r.ok)throw new Error("topics");return r.json()})).map(localizeTopic);const groups=await Promise.all(Object.entries(CONFIG).map(async([type,config])=>[type,await fetch(config.file).then(r=>{if(!r.ok)throw new Error(config.file);return r.json()})]));datasets=Object.fromEntries(groups);relations=await fetch("data/relations.json").then(r=>{if(!r.ok)throw new Error("relations");return r.json()})}catch(error){renderError("专题数据没有成功加载。请通过本地网站地址访问。");return}const topic=topics.find(x=>x.id===topicId);if(!topic){renderError("没有找到这个专题档案。");return}document.title=topic.name+" - "+(LANGUAGE==="en"?"Indication Dossier":"专题档案");render(topic)}
function items(topic,type){return(topic.related?.[type]||[]).map(id=>datasets[type].find(x=>x.id===id)).filter(Boolean)}
function researchCard(item){const en=item.i18n?.en||{};const title=LANGUAGE==="en"?(en.title_cn||item.official_title||item.title_cn):item.title_cn;const copy=LANGUAGE==="en"?(en.one_liner||item.one_liner):item.one_liner;const level=LANGUAGE==="en"?(en.evidence_level||item.evidence_level):item.evidence_level;return`<a class="object" href="${CONFIG.research.url(item.id)}"><div class="object-type">研究证据${level?` · ${esc(level)}`:""}</div><strong>${esc(title)}</strong><p>${esc(copy||"")}</p></a>`}
function indicationStage(trial){if(trial.study_sponsorship==="IIT")return"IIT";if(trial.development_band)return trial.development_band;const phase=String(trial.phase||"");if(/phase\s*(?:2\s*\/\s*)?3|pivotal/i.test(phase))return"Pivotal study";if(/phase\s*2|phase\s*1\s*\/\s*2/i.test(phase))return"Ph2";return"Ph1"}
function companyForTrial(topic,trial){const companyIds=new Set(topic.related?.company||[]);const relation=relations.find(row=>row.source_type==="company"&&companyIds.has(row.source_id)&&row.target_type==="trial"&&row.target_id===trial.id);return relation?datasets.company.find(item=>item.id===relation.source_id):null}
function trialCard(topic,trial){const company=companyForTrial(topic,trial);const owner=company?.company||trial.sponsor;const title=[owner,trial.product].filter(Boolean).join(" / ");const meta=[trial.study_sponsorship,trial.phase,trial.registry_id].filter(Boolean).join(" · ");const copy=LANGUAGE==="en"?(trial.i18n?.en?.trial_name||trial.official_title||trial.trial_name):trial.trial_name;return`<a class="object" href="${CONFIG.trial.url(trial.id)}"><div class="object-type">${esc(meta)}</div><strong>${esc(title||copy)}</strong><p>${esc(copy||trial.evidence_goal||"")}</p></a>`}
function developmentGroups(topic){const trials=items(topic,"trial");const groups=["Pivotal study","Ph2","Ph1","IIT"];return groups.map(group=>{const data=trials.filter(trial=>indicationStage(trial)===group);if(!data.length)return"";return`<div class="eyebrow" style="margin-top:14px">${group}</div><div class="objects">${data.map(trial=>trialCard(topic,trial)).join("")}</div>`}).join("")}
function antibodyMap(topic){if(!topic.antibody_groups?.length)return"";return`<section class="panel"><div class="section-head"><div><div class="eyebrow">Antibody Stratification</div><h2>抗体分层证据地图</h2></div><span>${topic.antibody_groups.reduce((sum,group)=>sum+group.items.length,0)} 个亚型</span></div><div class="antibody-groups">${topic.antibody_groups.map(group=>`<div class="antibody-group"><h3>${esc(group.group)}</h3><p class="antibody-logic">${esc(group.logic)}</p><div class="antibody-grid">${group.items.map(item=>`<article class="antibody-item"><strong>${esc(item.antibody)}</strong><p>${esc(item.phenotype)}</p><span>${esc(item.evidence)}</span></article>`).join("")}</div></div>`).join("")}</div></section>`}
function render(topic){const counts=[[items(topic,"research").length,"研究证据"],[items(topic,"trial").length,"竞争项目"]];document.getElementById("app").innerHTML=`<section class="hero"><div class="breadcrumb"><a href="index.html">首页</a> / <a href="topics.html">专题档案</a> / ${esc(topic.short_name)}</div><span class="kicker">${esc(topic.maturity)}</span><h1>${esc(topic.name)}</h1><p class="hero-sub">${esc(topic.summary)}</p><div class="tags"><span class="tag">${esc(topic.priority)}优先级</span>${topic.keywords.map(x=>`<span class="tag">${esc(x)}</span>`).join("")}</div></section><div class="layout"><div class="stack"><section class="panel"><div class="eyebrow">Intelligence Thesis</div><h2>核心判断</h2><div class="thesis">${esc(topic.thesis)}</div></section><div class="split"><section class="panel"><div class="eyebrow">Unmet Need</div><h2>未满足需求</h2><p class="copy">${esc(topic.unmet_need)}</p></section><section class="panel"><div class="eyebrow">Next Catalyst</div><h2>下一关键催化剂</h2><p class="copy">${esc(topic.next_catalyst)}</p></section></div>${antibodyMap(topic)}<section class="panel"><div class="section-head"><div><div class="eyebrow">Development</div><h2>竞争项目与试验</h2></div><span>${items(topic,"trial").length} 项</span></div>${developmentGroups(topic)||'<div class="empty">当前尚无关联项目。</div>'}</section><section class="panel"><div class="section-head"><div><div class="eyebrow">Evidence</div><h2>研究证据</h2></div><span>${items(topic,"research").length} 项</span></div><div class="objects">${items(topic,"research").map(researchCard).join("")||'<div class="empty">当前尚无直接研究证据。</div>'}</div></section></div><aside class="stack"><section class="panel"><div class="eyebrow">Coverage</div><h2>专题覆盖</h2><div class="metric-grid">${counts.map(x=>`<div class="metric"><strong>${x[0]}</strong><span>${x[1]}</span></div>`).join("")}</div></section><section class="panel"><div class="eyebrow">Critical Questions</div><h2>关键问题</h2><div class="list">${topic.key_questions.map(x=>`<div class="list-item"><b>•</b><span>${esc(x)}</span></div>`).join("")}</div></section><section class="panel"><div class="eyebrow">Evidence Gaps</div><h2>证据缺口</h2><div class="list">${topic.evidence_gaps.map(x=>`<div class="list-item"><b>•</b><span>${esc(x)}</span></div>`).join("")}</div></section></aside></div>`}
function renderError(message){document.getElementById("app").innerHTML=`<div class="error"><h1>专题暂时无法打开</h1><p>${esc(message)}</p><a href="topics.html">返回专题库</a></div>`}load();
</script><script src="assets/app-shell.js"></script></body></html>

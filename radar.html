<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>官网更新雷达 - 神经免疫CAR-T情报工作台</title>
<style>
:root{--bg:#f4f6f4;--surface:#fff;--soft:#edf1ed;--border:#d6ddd8;--text:#172019;--text2:#465149;--text3:#707b73;--accent:#176049;--accent2:#0f766e;--accent-light:#e7f3ed;--amber:#8a5b00;--amber-light:#fff1cf;--red:#b42318;--red-light:#fff0ee;--green:#167044;--green-light:#eaf7ef;--blue:#315f84;--blue-light:#e7f0f8;--mono:"SF Mono","Fira Code",monospace;--sans:"Avenir Next","PingFang SC","Microsoft YaHei",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{background:radial-gradient(circle at 92% 4%,#dcece4 0,transparent 27%),var(--bg);color:var(--text);font:14px/1.65 var(--sans)}a{color:inherit}nav{height:60px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}.nav-logo{font-weight:800;text-decoration:none}.nav-links{display:flex;gap:3px;list-style:none}.nav-links a{padding:7px 9px;border-radius:6px;color:var(--text2);font-size:12px;text-decoration:none}.nav-links a.active{background:var(--accent-light);color:var(--accent);font-weight:700}.nav-action{padding:6px 9px;border:1px solid var(--border);border-radius:6px;text-decoration:none;font-size:11px}.shell{max-width:1180px;margin:0 auto;padding:0 32px 48px}.hero{padding:36px 0 27px;display:grid;grid-template-columns:minmax(0,1.25fr) 360px;gap:22px;border-bottom:1px solid var(--border)}.kicker{display:inline-flex;padding:5px 10px;border:1px solid #c6ded3;border-radius:999px;background:var(--accent-light);color:var(--accent2);font:700 10px var(--mono);letter-spacing:.08em}.hero h1{margin-top:14px;font-size:38px;line-height:1.15}.hero p{max-width:720px;margin-top:11px;color:var(--text2)}.hero-note{margin-top:17px;padding:11px 13px;border-left:3px solid var(--amber);background:var(--amber-light);color:#684600;font-size:11px}.pulse{padding:18px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.92);box-shadow:0 16px 40px rgba(23,96,73,.08)}.pulse-label{color:var(--text3);font:700 10px var(--mono);text-transform:uppercase}.pulse-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}.pulse-stat{padding:12px;border-radius:7px;background:var(--soft)}.pulse-stat strong{display:block;color:var(--accent);font:800 23px/1 var(--mono)}.pulse-stat span{display:block;margin-top:6px;color:var(--text3);font-size:10px}.pulse time{display:block;margin-top:12px;color:var(--text3);font:10px var(--mono)}.section{padding:27px 0;border-bottom:1px solid var(--border)}.section-head{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:15px}.eyebrow{color:var(--text3);font:700 10px var(--mono);letter-spacing:.08em;text-transform:uppercase}.section h2{margin-top:4px;font-size:23px}.section-desc{max-width:620px;color:var(--text2);font-size:11px}.source-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.source-card{padding:17px;border:1px solid var(--border);border-radius:9px;background:var(--surface)}.source-top{display:flex;justify-content:space-between;gap:12px;align-items:start}.source-card h3{font-size:15px}.source-entity{margin-top:3px;color:var(--text3);font:10px var(--mono)}.status{padding:4px 8px;border-radius:999px;font-size:9px;font-weight:800;white-space:nowrap}.status.ok{background:var(--green-light);color:var(--green)}.status.partial{background:var(--amber-light);color:var(--amber)}.status.error{background:var(--red-light);color:var(--red)}.status.unknown{background:var(--soft);color:var(--text3)}.source-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:13px}.source-metric{padding:9px;background:var(--soft);border-radius:6px}.source-metric strong{display:block;font:700 15px var(--mono)}.source-metric span{color:var(--text3);font-size:9px}.source-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}.source-links a{padding:4px 7px;border:1px solid var(--border);border-radius:5px;color:var(--accent);font-size:10px;text-decoration:none}.source-alert{margin-top:11px;padding-top:10px;border-top:1px solid var(--border);color:var(--text3);font-size:10px}.source-alert.warn{color:var(--red)}.layout{display:grid;grid-template-columns:minmax(0,1fr) 350px;gap:18px}.timeline{position:relative;display:flex;flex-direction:column;gap:9px}.timeline:before{content:"";position:absolute;left:11px;top:12px;bottom:12px;width:1px;background:var(--border)}.event{position:relative;margin-left:30px;padding:14px;border:1px solid var(--border);border-radius:8px;background:var(--surface)}.event:before{content:"";position:absolute;left:-24px;top:18px;width:9px;height:9px;border:3px solid var(--bg);border-radius:50%;background:var(--amber)}.event h3{font-size:13px}.event p{margin-top:5px;color:var(--text2);font-size:10px}.event-foot{display:flex;justify-content:space-between;gap:10px;margin-top:10px;color:var(--text3);font:9px var(--mono)}.event-foot a{color:var(--accent);font:700 10px var(--sans);text-decoration:none}.review-panel{padding:16px;border:1px solid var(--border);border-radius:9px;background:var(--surface)}.review-panel h3{font-size:15px}.review-list{display:flex;flex-direction:column;gap:8px;margin-top:11px}.review-item{padding:10px;border-radius:7px;background:var(--soft)}.review-item strong{display:block;font-size:11px}.review-item p{margin-top:3px;color:var(--text3);font-size:9px}.review-item.error{background:var(--red-light);color:var(--red)}.workflow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.step{padding:14px;border:1px solid var(--border);border-radius:8px;background:var(--surface)}.step-num{color:var(--accent);font:800 18px var(--mono)}.step h3{margin-top:12px;font-size:12px}.step p{margin-top:5px;color:var(--text3);font-size:10px}.empty{padding:30px;border:1px dashed var(--border);border-radius:8px;color:var(--text3);text-align:center;font-size:11px}body>footer{max-width:1180px;margin:0 auto;padding:20px 32px 36px;color:var(--text3);font-size:11px}@media(max-width:900px){.hero,.layout{grid-template-columns:1fr}.source-grid{grid-template-columns:1fr}.workflow{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){nav,.shell,body>footer{padding-left:16px;padding-right:16px}.nav-links{display:none}.hero{padding-top:25px}.hero h1{font-size:30px}.pulse-row,.workflow{grid-template-columns:1fr}.section-head{align-items:start;flex-direction:column}.source-metrics{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<nav><a class="nav-logo" href="index.html">神经免疫 CAR-T 情报工作台</a><ul class="nav-links"><li><a href="index.html">首页</a></li><li><a href="research.html">研究情报</a></li><li><a href="landscape.html">竞争格局</a></li><li><a class="active" href="radar.html">官网雷达</a></li></ul><a class="nav-action" href="candidates.html">候选池</a></nav>
<main class="shell" id="app"><div class="empty">正在读取官网监测状态...</div></main>
<footer>雷达中的“变化”仅代表页面内容或资产指纹变化。完成逐字段核验前，不构成产品阶段、适应症或监管状态的正式结论。</footer>
<script src="assets/radar-data.js"></script>
<script>
const esc=value=>String(value??"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]));
const statusLabels={ok:"监测正常",partial:"部分可用",error:"访问失败",unknown:"尚未运行"};
const linkLabel=url=>/pipeline|proline|our-pipeline/i.test(url)?"Pipeline":/press|news|info\.php/i.test(url)?"Press / News":"官网入口";
async function load(){try{if(globalThis.NEUROIMMUNE_RADAR_DATA){render(globalThis.NEUROIMMUNE_RADAR_DATA.report,globalThis.NEUROIMMUNE_RADAR_DATA.config);return}const[report,config]=await Promise.all([fetch("data/candidate-report.json").then(r=>r.json()),fetch("data/discovery-config.json").then(r=>r.json())]);render(report,config)}catch{document.getElementById("app").innerHTML='<div class="empty">官网监测报告尚未生成或读取失败。</div>'}}
function render(report,config){
  const entities=new Map((config.entities||[]).map(item=>[item.id,item.label]));
  const runs=new Map((report.source_runs||[]).filter(item=>item.source_kind==="official_website").map(item=>[item.source_id,item]));
  const reliableUpdates=(report.candidates||[]).filter(item=>item.candidate_type==="official_update").filter(item=>{const match=(item.query_matches||[]).find(value=>value.startsWith("official:"));const run=runs.get(match?.split(":")[1]);return !run||run.status!=="error"});
  const failed=[...runs.values()].filter(run=>run.status==="error");
  const partial=[...runs.values()].filter(run=>run.status==="partial");
  const missing=[...runs.values()].reduce((sum,run)=>sum+(run.sentinel_check?.missing?.length||0),0);
  const sourceCards=(config.official_sources||[]).map(source=>{const run=runs.get(source.id);const status=run?.status||"unknown";const entityText=(source.entity_ids||[]).map(id=>entities.get(id)||id).join(" · ");const missingCount=run?.sentinel_check?.missing?.length||0;const errors=run?.errors?.length||0;const seconds=run?.duration_ms?`${(run.duration_ms/1000).toFixed(1)} 秒`:"尚未计时";return `<article class="source-card"><div class="source-top"><div><h3>${esc(source.name)}</h3><div class="source-entity">${esc(entityText)}</div></div><span class="status ${status}">${statusLabels[status]}</span></div><div class="source-metrics"><div class="source-metric"><strong>${run?.successful_pages??"—"}</strong><span>有效页面</span></div><div class="source-metric"><strong>${run?.relevant_links??"—"}</strong><span>相关链接</span></div><div class="source-metric"><strong>${run?.assets_monitored??"—"}</strong><span>管线资产</span></div></div><div class="source-links">${source.urls.map(url=>`<a href="${esc(url)}" target="_blank" rel="noopener">${linkLabel(url)}</a>`).join("")}</div><div class="source-alert ${status==="error"||missingCount?"warn":""}">${status==="error"?`本轮 ${errors} 个入口访问失败，无法判断官网是否变化。`:status==="partial"?`部分入口不可用；已有页面结果可作线索，仍需补查。`:missingCount?`${missingCount} 个哨兵链接未命中，需要人工确认页面迁移或下线。`:run?.changed===true?"检测到完整快照变化，已进入人工核验。":run?.changed===false?"与上一份完整快照相比未发现变化。":"等待形成两份完整快照后开始变化比较。"} · ${seconds}</div></article>`}).join("");
  const events=reliableUpdates.length?reliableUpdates.map(item=>`<article class="event"><h3>${esc(item.title)}</h3><p>${esc((item.triage_reasons||[]).join(" · ")||"官网一手线索，等待逐字段核验。")}</p><div class="event-foot"><span>${esc(item.publication_date||"日期待核验")}</span><a href="${esc(item.source_url)}" target="_blank" rel="noopener">查看官网 →</a></div></article>`).join(""):'<div class="empty">本轮没有可可靠判定的官网变化。访问失败不会计为更新。</div>';
  const reviewItems=[...reliableUpdates.map(item=>({title:item.title,note:"逐字段核验 pipeline、适应症、地区、阶段和披露日期",tone:""})),...failed.map(run=>({title:run.source,note:"官网访问失败，需浏览器人工补查",tone:"error"})),...partial.map(run=>({title:run.source,note:"部分页面不可用，需确认遗漏范围",tone:"error"}))];
  document.getElementById("app").innerHTML=`<section class="hero"><div><span class="kicker">OFFICIAL SOURCE WATCH</span><h1>关键产品官网更新雷达</h1><p>同时监测 pipeline、press release 与 news 入口。系统只负责发现页面、链接和资产变化；产品阶段、适应症和监管含义仍由人工逐字段确认。</p><div class="hero-note">判定原则：抓取失败 = 无法判断，不等于官网发生变化；只有连续两份完整快照可比较时，才生成“页面变化”信号。</div></div><aside class="pulse"><div class="pulse-label">本轮监测脉冲</div><div class="pulse-row"><div class="pulse-stat"><strong>${config.official_sources?.length||0}</strong><span>重点官网</span></div><div class="pulse-stat"><strong>${reliableUpdates.length}</strong><span>可靠变化线索</span></div><div class="pulse-stat"><strong>${failed.length+partial.length}</strong><span>访问异常</span></div><div class="pulse-stat"><strong>${missing}</strong><span>哨兵未命中</span></div></div><time>运行于 ${new Date(report.generated_at).toLocaleString("zh-CN")}</time></aside></section><section class="section"><div class="section-head"><div><div class="eyebrow">Coverage</div><h2>重点产品与官网入口</h2></div><p class="section-desc">每家公司同时覆盖产品管线页和正式新闻入口；页面中的图片、图表等管线资产也纳入指纹监测。</p></div><div class="source-grid">${sourceCards}</div></section><section class="section"><div class="layout"><div><div class="section-head"><div><div class="eyebrow">Change Signals</div><h2>变化信号时间线</h2></div></div><div class="timeline">${events}</div></div><aside><div class="review-panel"><div class="eyebrow">Human Review Queue</div><h3>需要人工介入</h3><div class="review-list">${reviewItems.length?reviewItems.map(item=>`<div class="review-item ${item.tone}"><strong>${esc(item.title)}</strong><p>${esc(item.note)}</p></div>`).join(""):'<div class="empty">当前没有人工待办。</div>'}</div></div></aside></div></section><section class="section"><div class="section-head"><div><div class="eyebrow">Review Gate</div><h2>从线索到正式数据</h2></div><p class="section-desc">候选不会自动晋级。每一步都保留证据边界和来源追溯。</p></div><div class="workflow"><article class="step"><div class="step-num">01</div><h3>自动发现</h3><p>监测官网页面、新闻链接、管线图片与内容指纹。</p></article><article class="step"><div class="step-num">02</div><h3>人工逐字段核验</h3><p>核对产品名、适应症、地区、阶段、日期和原始措辞。</p></article><article class="step"><div class="step-num">03</div><h3>交叉核验与定级</h3><p>与注册库、监管入口或第二个独立一手来源对照。</p></article><article class="step"><div class="step-num">04</div><h3>写入并审计</h3><p>同步正式数据、来源、关系和验证记录，再执行全量审计。</p></article></div></section>`;
}
load();
</script>
<script src="assets/app-shell.js"></script>
</body>
</html>

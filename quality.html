<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>数据质量 - 神经免疫CAR-T情报工作台</title>
<style>
:root{--bg:#f6f7f5;--surface:#fff;--soft:#edf1ed;--border:#d8ddd7;--text:#18201a;--text2:#485149;--text3:#7a837c;--accent:#176049;--accent2:#0f766e;--accent-light:#e6f3ed;--red:#b42318;--red-light:#fff0ee;--amber:#936100;--amber-light:#fff5d6;--green:#167044;--green-light:#eaf7ef;--mono:"SF Mono","Fira Code",monospace;--sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font:14px/1.65 var(--sans)}a{color:inherit}nav{height:60px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;text-decoration:none}.dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 0 4px rgba(15,118,110,.12)}.nav-links{display:flex;gap:3px;list-style:none}.nav-links a{padding:7px 8px;border-radius:6px;color:var(--text2);font-size:12px;text-decoration:none}.nav-links a:hover{background:var(--soft)}.nav-action{padding:5px 9px;border:1px solid var(--border);border-radius:999px;background:var(--soft);color:var(--text3);font:10px var(--mono);text-decoration:none;white-space:nowrap}.shell{max-width:1180px;margin:0 auto;padding:0 32px 48px}.hero{padding:34px 0 26px;display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:18px;border-bottom:1px solid var(--border)}.breadcrumb{margin-bottom:12px;color:var(--text3);font-size:12px}.breadcrumb a{color:var(--accent);text-decoration:none}.kicker{display:inline-flex;margin-bottom:13px;padding:5px 9px;border:1px solid #c6ded3;border-radius:999px;background:var(--accent-light);color:var(--accent2);font:11px var(--mono);text-transform:uppercase}.hero h1{font-size:34px;line-height:1.18}.hero-sub{max-width:760px;margin-top:10px;color:var(--text2);font-size:14px}.score-card,.stat,.panel,.dataset,.source{border:1px solid var(--border);border-radius:8px;background:var(--surface)}.score-card{padding:18px;display:grid;grid-template-columns:96px 1fr;gap:14px;align-items:center}.score{width:92px;height:92px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--amber) var(--score),var(--soft) 0);position:relative}.score:after{content:"";position:absolute;inset:8px;border-radius:50%;background:var(--surface)}.score strong{position:relative;z-index:1;color:var(--text);font:700 28px var(--mono)}.score-meta span{display:inline-flex;padding:4px 8px;border-radius:999px;background:var(--amber-light);color:var(--amber);font-size:10px;font-weight:700}.score-meta p{margin-top:8px;color:var(--text2);font-size:12px}.score-meta time{display:block;margin-top:7px;color:var(--text3);font:10px var(--mono)}.stats{padding:20px 0;display:grid;grid-template-columns:repeat(6,1fr);gap:8px;border-bottom:1px solid var(--border)}.stat{padding:13px}.stat strong{display:block;color:var(--accent);font:700 22px/1 var(--mono)}.stat span{display:block;margin-top:7px;color:var(--text3);font-size:10px}.section{padding:25px 0;border-bottom:1px solid var(--border)}.section-head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:13px}.eyebrow{margin-bottom:4px;color:var(--text3);font:11px var(--mono);text-transform:uppercase}.section h2{font-size:22px}.section-desc{max-width:730px;color:var(--text2);font-size:12px}.dataset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.dataset{padding:15px}.dataset-top{display:flex;justify-content:space-between;gap:10px}.dataset h3{font-size:14px}.dataset-count{color:var(--accent);font:700 18px var(--mono)}.bar{height:6px;margin:12px 0 9px;border-radius:999px;background:var(--soft);overflow:hidden}.bar span{display:block;height:100%;background:var(--green)}.dataset-meta{display:flex;justify-content:space-between;color:var(--text3);font-size:10px}.layout{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:18px}.panel{padding:16px}.issue-list{display:flex;flex-direction:column;gap:7px}.issue{padding:11px 12px;display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;border:1px solid var(--border);border-radius:7px}.issue.warning{background:var(--amber-light);border-color:#ead8a2}.issue.error{background:var(--red-light);border-color:#ecc4bf}.issue-badge{height:max-content;padding:3px 7px;border-radius:999px;background:var(--surface);font:700 9px var(--mono)}.issue strong{display:block;font-size:12px}.issue p{margin-top:3px;color:var(--text2);font-size:11px}.issue code{display:block;margin-top:4px;color:var(--text3);font:10px var(--mono)}.policy-list{display:flex;flex-direction:column;gap:7px}.policy{padding:9px 0;display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--border);font-size:11px}.policy:last-child{border-bottom:0}.policy span{color:var(--text3)}.source-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.source{padding:15px}.source-top{display:flex;justify-content:space-between;gap:10px}.source h3{font-size:14px}.status{padding:3px 7px;border-radius:999px;background:var(--soft);color:var(--text3);font-size:9px;font-weight:700;white-space:nowrap}.status.available{background:var(--green-light);color:var(--green)}.source p{margin-top:7px;color:var(--text2);font-size:11px}.source footer{margin-top:9px;color:var(--text3);font:10px var(--mono)}.checks{display:flex;flex-wrap:wrap;gap:6px}.check{padding:6px 9px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--text2);font-size:10px}.empty{padding:35px;color:var(--text3);text-align:center}body>footer{max-width:1180px;margin:0 auto;padding:20px 32px 36px;color:var(--text3);font-size:11px}@media(max-width:980px){.hero,.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}.dataset-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:700px){nav{padding:0 16px}.nav-links{display:none}.shell{padding:0 16px 32px}.hero{padding-top:24px}.hero h1{font-size:28px}.stats,.dataset-grid,.source-grid{grid-template-columns:1fr}.score-card{grid-template-columns:82px 1fr}.score{width:78px;height:78px}body>footer{padding:18px 16px 28px}}
</style></head><body><nav><a class="nav-logo" href="index.html"><span class="dot"></span>神经免疫 CAR-T 情报工作台</a><ul class="nav-links"><li><a href="index.html">首页</a></li><li><a href="topics.html">专题档案</a></li><li><a href="research.html">研究情报</a></li><li><a href="landscape.html">竞争格局</a></li></ul><a class="nav-action" href="search.html">全局检索</a></nav><main class="shell" id="app"><div class="empty">正在读取质量报告...</div></main><footer>质量面板展示结构完整性、来源核验和数据时效性；“无错误”不等同于所有业务判断均已被外部证实。</footer>
<script>
function esc(value){return String(value??"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]))}
async function load(){try{const[report,sources,verification]=await Promise.all([fetch("data/quality-report.json").then(r=>r.json()),fetch("data/sources.json").then(r=>r.json()),fetch("data/verification.json").then(r=>r.json())]);render(report,sources,verification)}catch(error){document.getElementById("app").innerHTML='<div class="empty">质量报告尚未生成或读取失败。</div>'}}
function render(report,sources,verification){const s=report.summary;const scoreColor=report.status==="通过"?"var(--green)":report.status==="阻断"?"var(--red)":"var(--amber)";document.getElementById("app").innerHTML=`<section class="hero"><div><div class="breadcrumb"><a href="index.html">首页</a> / 数据质量</div><span class="kicker">Data Integrity & Freshness</span><h1>数据质量与自我核查</h1><p class="hero-sub">每次网站启动前自动检查数据结构、来源、日期、跨表引用和核验时效；阻断错误会阻止启动，待核验事项会保留为明确警告。</p></div><aside class="score-card"><div class="score" style="--score:${report.score}%;--amber:${scoreColor}"><strong>${report.score}</strong></div><div class="score-meta"><span>${esc(report.status)}</span><p>质量策略 v${esc(report.policy_version)} · 截止 ${esc(report.as_of)}</p><time>报告生成 ${new Date(report.generated_at).toLocaleString("zh-CN")}</time></div></aside></section><section class="stats"><div class="stat"><strong>${s.total_records}</strong><span>结构化对象</span></div><div class="stat"><strong>${s.verified}</strong><span>外部已核验</span></div><div class="stat"><strong>${s.internally_reviewed}</strong><span>内部已审核</span></div><div class="stat"><strong>${s.pending_external_verification}</strong><span>待外部核验</span></div><div class="stat"><strong>${s.errors}</strong><span>阻断错误</span></div><div class="stat"><strong>${s.stale}</strong><span>已过期</span></div></section><section class="section"><div class="section-head"><div><div class="eyebrow">Dataset Coverage</div><h2>分数据集核验覆盖</h2></div><p class="section-desc">绿色进度只表示完成外部逐字段核验；内部编辑判断单独计数，不与外部事实混合。</p></div><div class="dataset-grid">${report.datasets.map(d=>{const pct=d.records?Math.round(d.verified/d.records*100):0;return`<article class="dataset"><div class="dataset-top"><h3>${esc(d.label)}</h3><span class="dataset-count">${d.records}</span></div><div class="bar"><span style="width:${pct}%"></span></div><div class="dataset-meta"><span>已核验 ${d.verified}</span><span>待核验 ${d.pending}</span><span>过期 ${d.stale}</span></div></article>`}).join("")}</div></section><section class="section"><div class="layout"><div><div class="section-head"><div><div class="eyebrow">Audit Findings</div><h2>当前核查事项</h2></div><span class="section-desc">${report.issues.length} 项</span></div><div class="issue-list">${report.issues.length?report.issues.map(i=>`<article class="issue ${i.severity}"><span class="issue-badge">${i.severity==="error"?"错误":"警告"}</span><div><strong>${esc(i.message)}</strong><p>${esc(i.record_type)} · ${esc(i.record_id)}</p><code>${esc(i.code)}</code></div></article>`).join(""):'<div class="empty">没有发现问题。</div>'}</div></div><aside><div class="panel"><div class="eyebrow">Freshness Policy</div><h2>复核周期</h2><div class="policy-list">${Object.entries(verification.freshness_policy_days).map(([type,days])=>`<div class="policy"><span>${esc(type)}</span><strong>${days} 天</strong></div>`).join("")}</div></div><div class="panel" style="margin-top:12px"><div class="eyebrow">Automated Checks</div><h2>自动检查范围</h2><div class="checks">${report.checks.map(x=>`<span class="check">${esc(x)}</span>`).join("")}</div></div></aside></div></section><section class="section"><div class="section-head"><div><div class="eyebrow">Source Registry</div><h2>来源登记表</h2></div><p class="section-desc">只有登记过的来源才能进入核验记录；内部判断不能冒充权威外部来源。</p></div><div class="source-grid">${sources.map(source=>`<article class="source"><div class="source-top"><div><div class="eyebrow">${esc(source.source_type)}</div><h3>${esc(source.name)}</h3></div><span class="status ${source.status==="可用"?"available":""}">${esc(source.status)}</span></div><p>${esc(source.scope)}</p><footer>权威度 ${esc(source.authority)} · ${source.check_interval_days} 天复核</footer></article>`).join("")}</div></section>`}
load();
</script><script src="assets/quality-operations.js"></script><script src="assets/app-shell.js"></script></body></html>

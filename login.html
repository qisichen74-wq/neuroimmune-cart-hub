<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>内部登录 - 自身免疫 CAR-T 情报工作台</title>
<style>
:root{--ink:#172019;--muted:#607067;--line:#d6dfd9;--paper:#f3f6f4;--white:#fff;--green:#176049;--green-soft:#e6f2ec;--red:#a7372b;--mono:"SFMono-Regular",Consolas,monospace;--sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;grid-template-columns:minmax(300px,.85fr) minmax(420px,1.15fr);background:var(--paper);color:var(--ink);font:14px/1.6 var(--sans)}.identity{position:relative;min-height:100vh;padding:48px;display:flex;flex-direction:column;justify-content:space-between;background:#153a2e;color:#f5fbf7;overflow:hidden}.identity:after{content:"";position:absolute;right:-110px;bottom:-150px;width:400px;height:400px;border:70px solid rgba(255,255,255,.055);border-radius:50%}.brand{position:relative;z-index:1;color:inherit;text-decoration:none;font-weight:750}.identity-copy{position:relative;z-index:1;max-width:480px}.eyebrow{font:700 10px var(--mono);letter-spacing:.13em;text-transform:uppercase;color:#9fd3bb}.identity h1{margin:14px 0 0;font-size:clamp(36px,5vw,72px);line-height:1.02;letter-spacing:-.045em}.identity p{max-width:420px;margin:22px 0 0;color:#cce0d6;font-size:15px}.identity-foot{position:relative;z-index:1;color:#9eb9ac;font:10px var(--mono)}.login-side{display:grid;place-items:center;padding:40px}.login-card{width:min(430px,100%)}.stamp{width:68px;height:68px;display:grid;place-items:center;border:1px solid #9fc6b4;border-radius:50%;color:var(--green);font:800 10px/1.2 var(--mono);text-align:center;transform:rotate(-7deg)}h2{margin:24px 0 4px;font-size:30px;letter-spacing:-.025em}.intro{margin:0 0 28px;color:var(--muted)}label{display:block;margin-top:16px;color:#33443b;font-size:12px;font-weight:700}input{width:100%;height:48px;margin-top:7px;padding:0 13px;border:1px solid var(--line);border-radius:7px;background:var(--white);color:var(--ink);font:15px var(--sans);outline:none}input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(23,96,73,.12)}button{width:100%;height:48px;margin-top:22px;border:0;border-radius:7px;background:var(--green);color:white;font-weight:750;cursor:pointer}button:hover{background:#104d3a}button:disabled{opacity:.6;cursor:wait}.error{min-height:24px;margin-top:11px;color:var(--red);font-size:12px}.setup{margin-top:24px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);font-size:11px}.setup code{font-family:var(--mono);color:#34463c}@media(max-width:820px){body{grid-template-columns:1fr}.identity{min-height:290px;padding:30px}.identity h1{font-size:42px}.identity-foot{display:none}.login-side{padding:36px 22px 54px}}@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}
</style>
</head>
<body>
<section class="identity">
  <a class="brand" href="index.html">自身免疫 CAR-T 情报工作台</a>
  <div class="identity-copy"><div class="eyebrow">Private review desk</div><h1>把判断<br>落成记录。</h1><p>登录后直接核对候选信息。确认、修改或排除一次提交即可完成审核，并自动记录审核人与时间。</p></div>
  <div class="identity-foot">PRIMARY SOURCE → HUMAN DECISION → AUDIT RECORD</div>
</section>
<main class="login-side">
  <form class="login-card" id="login-form">
    <div class="stamp">HUMAN<br>VERIFIED</div>
    <h2>内部账号登录</h2>
    <p class="intro">候选池、数据质量和审核记录仅对登录用户开放。</p>
    <label for="username">账号</label><input id="username" name="username" autocomplete="username" required>
    <label for="password">密码</label><input id="password" name="password" type="password" autocomplete="current-password" required>
    <button id="submit" type="submit">登录并开始审核</button>
    <div class="error" id="error" role="alert"></div>
    <p class="setup">本机首次运行默认账号为 <code>reviewer</code>，默认密码为 <code>review2026</code>。正式使用请通过 <code>INTEL_REVIEW_USER</code> 和 <code>INTEL_REVIEW_PASSWORD</code> 修改。</p>
  </form>
</main>
<script>
const LOGIN_EN=localStorage.getItem("intel-language")==="en";
if(LOGIN_EN){document.documentElement.lang="en";document.title="Staff login - Autoimmune CAR-T Intelligence Hub";const pairs=new Map([
  ["自身免疫 CAR-T 情报工作台","Autoimmune CAR-T Intelligence Hub"],["把判断","Turn decisions"],["落成记录。","into records."],["登录后直接核对候选信息。确认、修改或排除一次提交即可完成审核，并自动记录审核人与时间。","Sign in to review candidates. Confirm, modify, or exclude in one step; the reviewer and time are recorded automatically."],["内部账号登录","Staff login"],["候选池、数据质量和审核记录仅对登录用户开放。","Candidates, data quality, and review records are available only to signed-in staff."],["账号","Username"],["密码","Password"],["登录并开始审核","Sign in and start reviewing"],["本机首次运行默认账号为","The default local username is"],["，默认密码为","and the default password is"],["。正式使用请通过",". For regular use, change them with"],["和","and"],["修改。","."]]);const walk=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);const nodes=[];while(walk.nextNode())nodes.push(walk.currentNode);nodes.forEach(node=>{const raw=node.nodeValue||"",trimmed=raw.trim();if(pairs.has(trimmed))node.nodeValue=raw.replace(trimmed,pairs.get(trimmed))});document.querySelector('label[for="username"]').textContent="Username";document.querySelector('label[for="password"]').textContent="Password"}
const form=document.getElementById("login-form"),error=document.getElementById("error"),submit=document.getElementById("submit");
const next=new URLSearchParams(location.search).get("next");
const destination=/^(review|candidates|quality)\.html$/.test(next||"")?next:"review.html";
fetch("/api/session").then(response=>{if(response.ok)location.replace(destination)}).catch(()=>{});
form.addEventListener("submit",async event=>{event.preventDefault();error.textContent="";submit.disabled=true;submit.textContent=LOGIN_EN?"Signing in…":"正在登录…";try{const response=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:form.username.value.trim(),password:form.password.value})});const payload=await response.json();if(!response.ok)throw new Error(LOGIN_EN?"Incorrect username or password":payload.error||"登录失败");location.replace(destination)}catch(reason){error.textContent=reason.message||(LOGIN_EN?"Cannot reach the review service. Open this page from the local site address.":"无法连接审核服务，请通过本地网站地址访问。");submit.disabled=false;submit.textContent=LOGIN_EN?"Sign in and start reviewing":"登录并开始审核"}});
</script>
</body>
</html>

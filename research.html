<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>研究情报 — 神经免疫CAR-T情报工作台</title>
<style>
  :root {
    --bg: #faf8ff;
    --bg2: #f3f0ff;
    --bg3: #ede9fe;
    --border: #ddd6fe;
    --border2: #c4b5fd;
    --accent: #7c3aed;
    --accent2: #6d28d9;
    --accent-light: #f5f3ff;
    --red: #dc2626;
    --red-light: #fef2f2;
    --yellow: #d97706;
    --yellow-light: #fffbeb;
    --green: #059669;
    --text: #0f172a;
    --text2: #475569;
    --text3: #94a3b8;
    --font-mono: 'SF Mono', 'Fira Code', monospace;
    --font-sans: 'Inter', -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.6;
  }

  /* NAV */
  nav {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
  }

  .live-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    position: relative;
  }

  .live-dot::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.3;
    animation: ripple 2s infinite;
  }

  @keyframes ripple {
    0% { transform: scale(0.8); opacity: 0.4; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  .nav-links { display: flex; gap: 2px; list-style: none; }

  .nav-links a {
    color: var(--text2);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    transition: all 0.12s;
  }

  .nav-links a:hover { background: var(--bg2); color: var(--text); }
  .nav-links a.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }

  .nav-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--bg2);
  }

  /* PAGE HEADER */
  .page-header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 32px 32px 24px;
    max-width: 1160px;
    margin: 0 auto;
  }

  .breadcrumb {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .breadcrumb a { color: var(--accent); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  .page-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 6px;
  }

  .page-sub {
    font-size: 13px;
    color: var(--text2);
  }

  /* MAIN */
  .main {
    max-width: 1160px;
    margin: 0 auto;
    padding: 28px 32px;
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 28px;
  }

  /* LEFT FILTER PANEL */
  .filter-panel {
    position: sticky;
    top: 72px;
    align-self: start;
  }

  .filter-section {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .filter-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .filter-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.12s;
    font-size: 13px;
    color: var(--text2);
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    gap: 6px;
  }

  .filter-option:hover { background: var(--bg2); color: var(--text); }

  .filter-option.active {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 500;
  }

  .filter-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    background: var(--bg2);
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: auto;
  }

  .filter-option.active .filter-count {
    background: var(--accent-light);
    color: var(--accent);
  }

  /* SEARCH */
  .search-box {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--font-sans);
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color 0.12s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text3); }

  /* CONTENT AREA */
  .content-area {}

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .result-info {
    font-size: 12px;
    color: var(--text3);
  }

  .sort-select {
    font-size: 12px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--text2);
    cursor: pointer;
    outline: none;
    font-family: var(--font-sans);
  }

  /* CARDS */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 10px;
    transition: all 0.12s;
    cursor: pointer;
  }

  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
  }

  .priority-badge {
    flex-shrink: 0;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 4px;
    font-weight: 600;
  }

  .priority-高 { background: var(--red-light); color: var(--red); }
  .priority-中 { background: var(--yellow-light); color: var(--yellow); }
  .priority-低 { background: var(--bg3); color: var(--text3); }

  .card-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .meta-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    background: var(--bg2);
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  .meta-tag.disease {
    color: var(--accent);
    background: var(--accent-light);
    border-color: var(--border2);
  }

  .card-liner {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.7;
    margin-bottom: 12px;
  }

  .card-reason {
    font-size: 12px;
    color: var(--text3);
    padding: 10px 12px;
    background: var(--bg2);
    border-radius: 5px;
    border-left: 3px solid var(--accent);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .card-pmid {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
  }

  .card-link {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }

  .card-link:hover { text-decoration: underline; }

  /* EMPTY / LOADING */
  .loading {
    display: flex; align-items: center; gap: 8px;
    color: var(--text3); font-size: 12px; padding: 40px 0;
    justify-content: center;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--text3); font-size: 13px;
  }

  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .stat-num {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    display: block;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    display: block;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 20px 32px;
    max-width: 1160px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .footer-disclaimer { font-size: 11px; color: var(--text3); }
  .footer-update { font-family: var(--font-mono); font-size: 10px; color: var(--text3); }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .filter-panel { position: static; }
    nav { padding: 0 16px; }
    .nav-links { display: none; }
    .page-header { padding: 20px 16px; }
    .main { padding: 16px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="live-dot"></span>
    神经免疫 CAR-T 情报工作台
  </a>
  <ul class="nav-links">
    <li><a href="index.html">首页</a></li>
    <li><a href="research.html" class="active">研究情报</a></li>
    <li><a href="landscape.html">竞争格局</a></li>
    <li><a href="trials.html">里程碑试验</a></li>
    <li><a href="safety.html">安全信号</a></li>
  </ul>
  <span class="nav-badge">Beta · 2026</span>
</nav>

<div style="background:#fff;border-bottom:1px solid var(--border);">
  <div class="page-header">
    <div class="breadcrumb">
      <a href="index.html">首页</a> › 研究情报
    </div>
    <h1 class="page-title">📡 研究情报</h1>
    <p class="page-sub">每日自动抓取 PubMed 最新文献，经 AI 分级筛选，聚焦神经免疫 CAR-T 临床与转化数据。</p>
  </div>
</div>

<div class="main">
  <!-- LEFT: FILTER PANEL -->
  <div class="filter-panel">

    <div class="filter-section">
      <div class="filter-section-title">搜索</div>
      <input class="search-box" type="text" placeholder="搜索标题或摘要..." oninput="handleSearch(this.value)">
    </div>

    <div class="filter-section">
      <div class="filter-section-title">优先级</div>
      <button class="filter-option active" onclick="setFilter('priority','全部')">
        全部 <span class="filter-count" id="count-all">—</span>
      </button>
      <button class="filter-option" onclick="setFilter('priority','高')">
        🔴 高优先级 <span class="filter-count" id="count-high">—</span>
      </button>
      <button class="filter-option" onclick="setFilter('priority','中')">
        🟡 中优先级 <span class="filter-count" id="count-mid">—</span>
      </button>
      <button class="filter-option" onclick="setFilter('priority','低')">
        ⚪ 低优先级 <span class="filter-count" id="count-low">—</span>
      </button>
    </div>

    <div class="filter-section">
      <div class="filter-section-title">适应症</div>
      <button class="filter-option" onclick="setFilter('disease','MS')">MS <span class="filter-count" id="count-ms">—</span></button>
      <button class="filter-option" onclick="setFilter('disease','MG')">MG <span class="filter-count" id="count-mg">—</span></button>
      <button class="filter-option" onclick="setFilter('disease','NMOSD')">NMOSD <span class="filter-count" id="count-nmosd">—</span></button>
      <button class="filter-option" onclick="setFilter('disease','AE')">AE <span class="filter-count" id="count-ae">—</span></button>
      <button class="filter-option" onclick="setFilter('disease','SPS')">SPS <span class="filter-count" id="count-sps">—</span></button>
      <button class="filter-option" onclick="setFilter('disease','其他自免')">其他自免 <span class="filter-count" id="count-other">—</span></button>
    </div>

    <div class="filter-section">
      <div class="filter-section-title">证据类型</div>
      <button class="filter-option" onclick="setFilter('evidence','临床')">临床研究</button>
      <button class="filter-option" onclick="setFilter('evidence','综述')">综述</button>
    </div>

  </div>

  <!-- RIGHT: CONTENT -->
  <div class="content-area">

    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-num" id="stat-total">—</span>
        <span class="stat-label">文献总数</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" style="color:var(--red)" id="stat-high">—</span>
        <span class="stat-label">🔴 高优先级</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" style="color:var(--yellow)" id="stat-mid">—</span>
        <span class="stat-label">🟡 中优先级</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" style="color:var(--accent)" id="stat-clinical">—</span>
        <span class="stat-label">临床研究</span>
      </div>
    </div>

    <div class="toolbar">
      <span class="result-info" id="result-info">正在加载...</span>
      <select class="sort-select" onchange="handleSort(this.value)">
        <option value="priority">按优先级排序</option>
        <option value="pmid">按PMID排序</option>
      </select>
    </div>

    <div id="feed-container">
      <div class="loading"><div class="spinner"></div>正在读取最新情报...</div>
    </div>

  </div>
</div>

<footer>
  <p class="footer-disclaimer">仅供科研与产业情报参考，不构成临床诊疗建议。数据来源：PubMed E-utilities API。</p>
  <span class="footer-update" id="footer-update">—</span>
</footer>

<script>
const SAMPLE_DATA = [
  { pmid:"42251699", title_cn:"CAR-T细胞疗法使合并CNS受累CLL与多发性硬化患者获得完全缓解", priority:"高", priority_reason:"首例CAR-T同时改善CLL/CNS受累与MS的直接临床证据，对神经免疫适应症拓展具有重要参考价值", evidence_level:"病例报道·IIT", disease:"MS", one_liner:"CD19 CAR-T治疗一例合并CNS受累CLL与MS患者，CLL完全缓解且MS疾病负担显著改善。" },
  { pmid:"42223209", title_cn:"CD19 CAR-T治疗进展性系统性硬化症的临床与蛋白质组学整合分析", priority:"高", priority_reason:"国内IND产品relma-cel在自身免疫适应症的多维度临床与蛋白组学数据", evidence_level:"病例系列·IIT", disease:"其他自免", one_liner:"对CD19 CAR-T治疗进展性SSc患者进行临床、免疫学及蛋白组学多维整合分析，系统表征疗效与机制。" },
  { pmid:"42167622", title_cn:"CAR-T及NK细胞疗法治疗自身免疫病系统综述与荟萃分析", priority:"中", priority_reason:"首个涵盖CAR细胞疗法治疗自免疾病的系统综述与荟萃分析", evidence_level:"综述", disease:"其他自免", one_liner:"系统评估CAR-T及CAR-NK在多种自身免疫病中的疗效、安全性与持久缓解情况。" },
  { pmid:"42286319", title_cn:"重编程免疫：CAR-T细胞疗法在多发性硬化中的前景与挑战", priority:"中", priority_reason:"系统梳理CAR-T治疗MS的机制与挑战，有助于领域背景把握", evidence_level:"综述", disease:"MS", one_liner:"综述CAR-T靶向清除致病性B细胞治疗难治性MS的机制、深度缓解潜力及挑战。" },
  { pmid:"42295377", title_cn:"多发性硬化症新兴治疗策略：聚焦创新与靶向方法", priority:"低", priority_reason:"综述性文章，无原始CAR-T临床数据，信息密度低", evidence_level:"综述", disease:"MS", one_liner:"综述MS新兴疗法，涵盖BTK抑制剂、CAR-T、EBV疫苗、髓鞘再生及纳米递药等。" },
  { pmid:"42171443", title_cn:"僵人谱系障碍的长期预后", priority:"中", priority_reason:"SPS长期预后数据稀缺，对CAR-T治疗目标疾病的自然史认知有参考价值", evidence_level:"队列研究", disease:"SPS", one_liner:"报道僵人谱系障碍长期预后数据，治疗持续应答存在差异，为该病自然史提供参考。" }
];

let allData = [];
let filtered = [];
let activeFilter = { type: 'priority', value: '全部' };
let searchQuery = '';
let sortBy = 'priority';

async function loadFeed() {
  try {
    const res = await fetch('data/feed.json');
    if (!res.ok) throw new Error();
    allData = await res.json();
  } catch(e) {
    allData = SAMPLE_DATA;
  }
  updateCounts();
  applyFilters();
  document.getElementById('footer-update').textContent =
    '更新于 ' + new Date().toLocaleDateString('zh-CN');
}

function updateCounts() {
  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-high').textContent = allData.filter(d=>d.priority==='高').length;
  document.getElementById('stat-mid').textContent = allData.filter(d=>d.priority==='中').length;
  document.getElementById('stat-clinical').textContent = allData.filter(d=>!d.evidence_level.includes('综述')).length;
  document.getElementById('count-all').textContent = allData.length;
  document.getElementById('count-high').textContent = allData.filter(d=>d.priority==='高').length;
  document.getElementById('count-mid').textContent = allData.filter(d=>d.priority==='中').length;
  document.getElementById('count-low').textContent = allData.filter(d=>d.priority==='低').length;
  document.getElementById('count-ms').textContent = allData.filter(d=>d.disease==='MS').length;
  document.getElementById('count-mg').textContent = allData.filter(d=>d.disease==='MG').length;
  document.getElementById('count-nmosd').textContent = allData.filter(d=>d.disease==='NMOSD').length;
  document.getElementById('count-ae').textContent = allData.filter(d=>d.disease==='AE').length;
  document.getElementById('count-sps').textContent = allData.filter(d=>d.disease==='SPS').length;
  document.getElementById('count-other').textContent = allData.filter(d=>d.disease==='其他自免').length;
}

function setFilter(type, value) {
  activeFilter = { type, value };
  document.querySelectorAll('.filter-option').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  applyFilters();
}

function handleSearch(q) {
  searchQuery = q.toLowerCase();
  applyFilters();
}

function handleSort(v) {
  sortBy = v;
  renderCards(filtered);
}

function applyFilters() {
  filtered = allData.filter(d => {
    const matchFilter = activeFilter.value === '全部' ? true :
      activeFilter.type === 'priority' ? d.priority === activeFilter.value :
      activeFilter.type === 'disease' ? d.disease === activeFilter.value :
      activeFilter.type === 'evidence' ? (activeFilter.value === '综述' ? d.evidence_level.includes('综述') : !d.evidence_level.includes('综述')) :
      true;
    const matchSearch = !searchQuery ||
      d.title_cn.toLowerCase().includes(searchQuery) ||
      d.one_liner.toLowerCase().includes(searchQuery);
    return matchFilter && matchSearch;
  });
  renderCards(filtered);
}

const priorityOrder = { '高': 0, '中': 1, '低': 2 };

function renderCards(data) {
  const sorted = [...data].sort((a, b) =>
    sortBy === 'priority'
      ? (priorityOrder[a.priority] ?? 3) - (priorityOrder[b.priority] ?? 3)
      : parseInt(b.pmid) - parseInt(a.pmid)
  );

  document.getElementById('result-info').textContent =
    `显示 ${sorted.length} / ${allData.length} 篇文献`;

  const container = document.getElementById('feed-container');

  if (sorted.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>暂无符合条件的文献</div>`;
    return;
  }

  container.innerHTML = sorted.map(d => `
    <div class="card" onclick="window.open('https://pubmed.ncbi.nlm.nih.gov/${d.pmid}/','_blank')">
      <div class="card-top">
        <span class="card-title">${d.title_cn}</span>
        <span class="priority-badge priority-${d.priority}">
          ${d.priority === '高' ? '🔴 高' : d.priority === '中' ? '🟡 中' : '⚪ 低'}
        </span>
      </div>
      <div class="card-meta">
        <span class="meta-tag disease">${d.disease}</span>
        <span class="meta-tag">${d.evidence_level}</span>
        <span class="meta-tag">PMID ${d.pmid}</span>
      </div>
      <p class="card-liner">${d.one_liner}</p>
      <div class="card-reason">💡 ${d.priority_reason}</div>
      <div class="card-footer">
        <span class="card-pmid">PubMed ID: ${d.pmid}</span>
        <a class="card-link" href="https://pubmed.ncbi.nlm.nih.gov/${d.pmid}/" target="_blank" onclick="event.stopPropagation()">查看原文 →</a>
      </div>
    </div>
  `).join('');
}

loadFeed();
</script>
</body>
</html>

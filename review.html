<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>人工审核 - 自身免疫 CAR-T 情报工作台</title>
<style>
:root{--bg:#f3f6f4;--surface:#fff;--soft:#edf2ef;--border:#d5ded8;--text:#172019;--text2:#48564e;--text3:#748078;--accent:#176049;--accent-dark:#104b39;--accent-light:#e4f1ea;--amber:#8a5c05;--amber-light:#fff4d5;--red:#a83a2e;--red-light:#fff0ed;--mono:"SFMono-Regular",Consolas,monospace;--sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.55 var(--sans)}a{color:inherit}header{height:62px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;gap:18px;position:sticky;top:0;z-index:20;background:rgba(255,255,255,.97);border-bottom:1px solid var(--border)}.brand{font-weight:780;text-decoration:none}.internal{margin-left:8px;padding:4px 7px;border-radius:4px;background:var(--accent-light);color:var(--accent);font:700 9px var(--mono)}.header-actions{display:flex;align-items:center;gap:8px}.header-actions a,.ghost{padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:white;color:var(--text2);font-size:11px;text-decoration:none}.ghost{cursor:pointer}.shell{max-width:1460px;margin:auto;padding:26px 28px 44px}.intro{display:flex;justify-content:space-between;gap:20px;align-items:end;padding-bottom:20px;border-bottom:1px solid var(--border)}.kicker{color:var(--accent);font:750 10px var(--mono);letter-spacing:.1em;text-transform:uppercase}.intro h1{margin:8px 0 0;font-size:34px;line-height:1.1;letter-spacing:-.025em}.intro p{max-width:650px;margin:8px 0 0;color:var(--text2)}.reviewer{color:var(--text3);font:11px var(--mono)}.stats{display:flex;gap:7px;margin-top:15px}.stat{padding:6px 9px;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--text3);font-size:10px}.stat strong{color:var(--accent);font-family:var(--mono)}.workspace{display:grid;grid-template-columns:minmax(330px,440px) minmax(0,1fr);gap:14px;margin-top:16px}.panel{border:1px solid var(--border);border-radius:9px;background:var(--surface);overflow:hidden}.queue-head{padding:14px;border-bottom:1px solid var(--border)}.filters{display:grid;grid-template-columns:1fr 126px 112px;gap:7px}.filters input,.filters select,.form-field input,.form-field textarea{width:100%;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font:12px var(--sans);outline:none}.filters input,.filters select{height:38px;padding:0 10px}.filters input:focus,.filters select:focus,.form-field input:focus,.form-field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(23,96,73,.1)}.queue-meta{display:flex;justify-content:space-between;margin-top:9px;color:var(--text3);font-size:10px}.candidate-list{height:calc(100vh - 256px);min-height:520px;overflow:auto}.candidate{width:100%;padding:13px 14px;display:block;border:0;border-bottom:1px solid var(--border);background:#fff;color:inherit;text-align:left;cursor:pointer}.candidate:hover{background:#f8fbf9}.candidate.is-active{background:var(--accent-light);box-shadow:inset 3px 0 var(--accent)}.candidate-top{display:flex;justify-content:space-between;gap:10px}.candidate-id{color:var(--accent);font:700 9px var(--mono)}.score{color:var(--text3);font:700 10px var(--mono)}.candidate strong{display:block;margin-top:6px;font-size:13px;line-height:1.42}.candidate-foot{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}.tag{padding:3px 6px;border-radius:4px;background:var(--soft);color:var(--text2);font-size:9px}.tag.priority{background:var(--amber-light);color:var(--amber)}.empty{padding:52px 24px;color:var(--text3);text-align:center}.desk{min-height:650px}.desk-empty{min-height:650px;display:grid;place-items:center;padding:40px;text-align:center}.desk-empty .seal{width:92px;height:92px;margin:auto;display:grid;place-items:center;border:1px solid #a8c9b9;border-radius:50%;color:var(--accent);font:800 11px/1.2 var(--mono);transform:rotate(-6deg)}.desk-empty h2{margin:20px 0 6px}.desk-empty p{max-width:420px;margin:0;color:var(--text3)}.desk-content{display:none}.desk.has-item .desk-empty{display:none}.desk.has-item .desk-content{display:block}.record-head{padding:21px 22px;border-bottom:1px solid var(--border)}.record-topline{display:flex;justify-content:space-between;gap:16px;align-items:start}.record-type{color:var(--accent);font:750 10px var(--mono);text-transform:uppercase}.record-head h2{margin:8px 0 0;font-size:22px;line-height:1.35}.source-link{flex:0 0 auto;padding:7px 10px;border:1px solid var(--border);border-radius:6px;color:var(--accent);font-size:11px;font-weight:700;text-decoration:none}.record-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}.form{padding:20px 22px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}.form-field.full{grid-column:1/-1}.form-field label{display:flex;justify-content:space-between;margin-bottom:6px;color:#35463d;font-size:11px;font-weight:720}.form-field label span{color:var(--text3);font-weight:400}.form-field input{height:42px;padding:0 11px}.form-field textarea{min-height:86px;padding:10px;resize:vertical}.review-note{margin-top:15px;padding:11px 13px;border-left:3px solid var(--accent);background:var(--soft);color:var(--text2);font-size:11px}.actions{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}.button{min-height:44px;padding:0 14px;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--text2);font-weight:750;cursor:pointer}.button.primary{border-color:var(--accent);background:var(--accent);color:#fff}.button.primary:hover{background:var(--accent-dark)}.button.modify{border-color:#8eb5a3;color:var(--accent)}.button.exclude{color:var(--red);border-color:#dfb9b2}.button:disabled{opacity:.55;cursor:wait}.toast{position:fixed;right:22px;bottom:22px;z-index:50;padding:11px 14px;border-radius:7px;background:#163d30;color:#fff;box-shadow:0 14px 30px rgba(17,45,35,.2);opacity:0;transform:translateY(10px);pointer-events:none;transition:.18s ease}.toast.show{opacity:1;transform:none}.toast.error{background:var(--red)}@media(max-width:940px){.workspace{grid-template-columns:1fr}.candidate-list{height:430px;min-height:0}.desk{min-height:580px}}@media(max-width:620px){header{padding:0 15px}.header-actions a{display:none}.shell{padding:20px 15px 34px}.intro{align-items:start;flex-direction:column}.filters,.form-grid,.actions{grid-template-columns:1fr}.form-field.full{grid-column:auto}.record-topline{flex-direction:column}.source-link{align-self:flex-start}}@media(prefers-reduced-motion:reduce){.toast{transition:none}}
</style>
</head>
<body>
<header><div><a class="brand" href="index.html">自身免疫 CAR-T 情报工作台</a><span class="internal">INTERNAL</span></div><div class="header-actions"><a href="candidates.html">完整候选池</a><a href="quality.html">数据质量</a><button class="ghost" id="logout">退出登录</button></div></header>
<main class="shell">
  <section class="intro"><div><div class="kicker">Human review desk</div><h1>核对后，一次完成审核</h1><p>选择候选，打开一手来源核对。信息无误就确认；需要订正就修改后完成；不符合纳入标准就排除。</p><div class="stats" id="stats"></div></div><div class="reviewer" id="reviewer"></div></section>
  <section class="workspace">
    <aside class="panel"><div class="queue-head"><div class="filters"><input id="query" type="search" placeholder="搜索标题、NCT、PMID或公司"><select id="type"><option value="all">全部类型</option><option value="trial">临床试验</option><option value="research">研究文献</option><option value="official_update">官网更新</option></select><select id="status"><option value="pending">待审核</option><option value="completed">已完成</option><option value="all">全部</option></select></div><div class="queue-meta"><span id="queue-meta">正在读取…</span><span>按优先级排序</span></div></div><div class="candidate-list" id="candidate-list"></div></aside>
    <section class="panel desk" id="desk"><div class="desk-empty"><div><div class="seal">HUMAN<br>REVIEW</div><h2>从左侧选择一条候选</h2><p>页面会保留来源链接和原始字段，审核结果自动记录账号与时间。</p></div></div><div class="desk-content"><div class="record-head"><div class="record-topline"><div><div class="record-type" id="record-type"></div><h2 id="record-title"></h2></div><a class="source-link" id="source-link" target="_blank" rel="noopener">打开一手来源 ↗</a></div><div class="record-meta" id="record-meta"></div></div><form class="form" id="review-form"><div class="form-grid"><div class="form-field full"><label for="field-title">标题 <span>可直接修正</span></label><input id="field-title" required></div><div class="form-field"><label for="field-entity">公司 / 申办方 / 期刊</label><input id="field-entity"></div><div class="form-field"><label for="field-disease">疾病 / 适应症</label><input id="field-disease"></div><div class="form-field full"><label for="field-note">审核备注 <span>可选</span></label><textarea id="field-note" placeholder="记录口径差异、证据限制或需要持续关注的事项"></textarea></div><div class="form-field full"><label for="field-reason">决定理由 <span>排除时必填</span></label><textarea id="field-reason" placeholder="确认时可留空；排除时说明重复、低相关或不满足纳入标准的原因"></textarea></div></div><div class="review-note">“确认并完成”保留原始字段；编辑任何字段后使用“保存修改并完成”。两种操作都会将候选标记为已审核。</div><div class="actions"><button class="button primary" type="button" data-action="confirm">确认并完成</button><button class="button modify" type="button" data-action="modify">保存修改并完成</button><button class="button exclude" type="button" data-action="exclude">排除</button></div></form></div></section>
  </section>
</main>
<div class="toast" id="toast" role="status"></div>
<script>
const REVIEW_EN=localStorage.getItem("intel-language")==="en";
const reviewEnglish={"自身免疫 CAR-T 情报工作台":"Autoimmune CAR-T Intelligence Hub","完整候选池":"Full candidate list","数据质量":"Data quality","退出登录":"Sign out","核对后，一次完成审核":"Review once, finish in one step","选择候选，打开一手来源核对。信息无误就确认；需要订正就修改后完成；不符合纳入标准就排除。":"Select a candidate and verify it against the primary source. Confirm it, save corrections, or exclude it in one step.","正在读取…":"Loading…","按优先级排序":"Sorted by priority","从左侧选择一条候选":"Select a candidate on the left","页面会保留来源链接和原始字段，审核结果自动记录账号与时间。":"The source and original fields remain visible; the reviewer and time are recorded automatically.","打开一手来源 ↗":"Open primary source ↗","标题":"Title","可直接修正":"Editable","公司 / 申办方 / 期刊":"Company / sponsor / journal","疾病 / 适应症":"Disease / indication","审核备注":"Review note","可选":"Optional","决定理由":"Decision rationale","排除时必填":"Required for exclusion","“确认并完成”保留原始字段；编辑任何字段后使用“保存修改并完成”。两种操作都会将候选标记为已审核。":"Confirm keeps the original fields. If you edit a field, choose Save changes and complete. Both actions mark the candidate as reviewed.","确认并完成":"Confirm and complete","保存修改并完成":"Save changes and complete","排除":"Exclude","全部类型":"All types","临床试验":"Clinical trials","研究文献":"Research","官网更新":"Official updates","待审核":"Pending","已完成":"Completed","全部":"All","立即核验":"Immediate review","持续观察":"Watch","背景材料":"Background","低相关":"Low relevance","待分级":"Untriaged","发布":"Publish","当前筛选条件下没有候选记录。":"No candidates match these filters.","排除候选时请填写决定理由":"Enter a reason before excluding this candidate","已排除并完成审核":"Excluded and review completed","已完成审核":"Review completed"};
const translateReviewUi=root=>{if(!REVIEW_EN||!root)return;const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);const nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);nodes.forEach(node=>{if(["SCRIPT","STYLE"].includes(node.parentElement?.tagName))return;const raw=node.nodeValue||"",trimmed=raw.trim();let value=reviewEnglish[trimmed];if(!value&&/^审核账号 · /.test(trimmed))value=trimmed.replace("审核账号 · ","Reviewer · ");if(!value&&/^显示 /.test(trimmed))value=trimmed.replace("显示 ","Showing ");if(value)node.nodeValue=raw.replace(trimmed,value)});root.querySelectorAll?.("[placeholder]").forEach(input=>{const placeholders={"搜索标题、NCT、PMID或公司":"Search title, NCT, PMID, or company","记录口径差异、证据限制或需要持续关注的事项":"Record wording differences, evidence limits, or follow-up points","确认时可留空；排除时说明重复、低相关或不满足纳入标准的原因":"Optional for confirmation; required when excluding a duplicate, low-relevance, or out-of-scope record"};if(placeholders[input.placeholder])input.placeholder=placeholders[input.placeholder]})};
if(REVIEW_EN){document.documentElement.lang="en";document.title="Human review - Autoimmune CAR-T Intelligence Hub";new MutationObserver(mutations=>mutations.forEach(mutation=>mutation.addedNodes.forEach(node=>translateReviewUi(node.nodeType===Node.TEXT_NODE?node.parentElement:node)))).observe(document.body,{childList:true,subtree:true});translateReviewUi(document.body)}
const esc=value=>String(value??"").replace(/[&<>"']/g,char=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[char]));
const typeLabels=REVIEW_EN?{trial:"Clinical trial",research:"Research",official_update:"Official update"}:{trial:"临床试验",research:"研究文献",official_update:"官网更新"};let selected=null,queue=[];
const elements={list:document.getElementById("candidate-list"),desk:document.getElementById("desk"),stats:document.getElementById("stats"),meta:document.getElementById("queue-meta"),reviewer:document.getElementById("reviewer"),toast:document.getElementById("toast")};
const showToast=(message,isError=false)=>{elements.toast.textContent=message;elements.toast.className=`toast show${isError?" error":""}`;clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>elements.toast.className="toast",2400)};
const candidateFields=item=>({title:item.title||"",entity:item.sponsor||item.journal||item.source||"",disease:(item.matched_diseases||[]).join(" / ")||(item.conditions||[]).join(" / ")||"",note:item.review_decision?.fields?.note||""});
async function request(url,options){const response=await fetch(url,options);if(response.status===401){location.replace(`login.html?next=${encodeURIComponent("review.html")}`);throw new Error("请先登录")}const payload=await response.json();if(!response.ok)throw new Error(payload.error||"操作失败");return payload}
async function load(){const params=new URLSearchParams({q:document.getElementById("query").value.trim(),type:document.getElementById("type").value,status:document.getElementById("status").value,limit:"60"});try{const data=await request(`/api/review-queue?${params}`);queue=data.candidates;elements.reviewer.textContent=`审核账号 · ${data.user}`;elements.stats.innerHTML=[[data.summary.pending,"待审核"],[data.summary.completed,"已完成"],[data.summary.total,"候选总数"]].map(([value,label])=>`<span class="stat"><strong>${value}</strong> ${label}</span>`).join("");elements.meta.textContent=`显示 ${queue.length} / ${data.summary.filtered}`;renderList();if(selected){const fresh=queue.find(item=>item.candidate_id===selected.candidate_id);fresh?selectCandidate(fresh):clearDesk()}}catch(reason){elements.list.innerHTML=`<div class="empty">${esc(reason.message)}</div>`}}
function renderList(){elements.list.innerHTML=queue.length?queue.map(item=>`<button class="candidate${selected?.candidate_id===item.candidate_id?" is-active":""}" data-id="${esc(item.candidate_id)}"><div class="candidate-top"><span class="candidate-id">${esc(item.external_id)}</span><span class="score">${esc(item.relevance_score??"—")}</span></div><strong>${esc(item.title)}</strong><div class="candidate-foot"><span class="tag priority">${esc(item.triage_tier||"待审核")}</span><span class="tag">${esc(typeLabels[item.candidate_type]||item.candidate_type)}</span>${(item.matched_diseases||[]).slice(0,2).map(value=>`<span class="tag">${esc(value)}</span>`).join("")}${item.review_decision?`<span class="tag">${esc(item.review_decision.decision)}</span>`:""}</div></button>`).join(""):'<div class="empty">当前筛选条件下没有候选记录。</div>';elements.list.querySelectorAll(".candidate").forEach(button=>button.addEventListener("click",()=>selectCandidate(queue.find(item=>item.candidate_id===button.dataset.id))))}
function selectCandidate(item){selected=item;renderList();elements.desk.classList.add("has-item");const fields=item.review_decision?.fields||candidateFields(item);document.getElementById("record-type").textContent=`${typeLabels[item.candidate_type]||item.candidate_type} · ${item.external_id}`;document.getElementById("record-title").textContent=item.title;document.getElementById("source-link").href=item.source_url;document.getElementById("record-meta").innerHTML=[item.triage_tier,`相关度 ${item.relevance_score??"—"}`,item.last_update_posted||item.publication_date,item.sponsor||item.journal||item.source].filter(Boolean).map(value=>`<span class="tag">${esc(value)}</span>`).join("");document.getElementById("field-title").value=fields.title||"";document.getElementById("field-entity").value=fields.entity||"";document.getElementById("field-disease").value=fields.disease||"";document.getElementById("field-note").value=fields.note||"";document.getElementById("field-reason").value=item.review_decision?.decision_reason||""}
function clearDesk(){selected=null;elements.desk.classList.remove("has-item");renderList()}
async function decide(action){if(!selected)return;const reason=document.getElementById("field-reason").value.trim();if(action==="exclude"&&!reason){showToast("排除候选时请填写决定理由",true);document.getElementById("field-reason").focus();return}const buttons=[...document.querySelectorAll("[data-action]")];buttons.forEach(button=>button.disabled=true);try{await request(`/api/reviews/${encodeURIComponent(selected.candidate_id)}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action,reason,fields:{title:document.getElementById("field-title").value,entity:document.getElementById("field-entity").value,disease:document.getElementById("field-disease").value,note:document.getElementById("field-note").value}})});showToast(action==="exclude"?"已排除并完成审核":"已完成审核");clearDesk();await load()}catch(reason){showToast(reason.message,true)}finally{buttons.forEach(button=>button.disabled=false)}}
let debounce;["query","type","status"].forEach(id=>document.getElementById(id).addEventListener("input",()=>{clearTimeout(debounce);debounce=setTimeout(load,220)}));document.querySelectorAll("[data-action]").forEach(button=>button.addEventListener("click",()=>decide(button.dataset.action)));document.getElementById("logout").addEventListener("click",async()=>{await fetch("/api/logout",{method:"POST"});location.replace("login.html")});load();
</script>
</body>
</html>
